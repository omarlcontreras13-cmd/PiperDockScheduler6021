  }).join('');
  const tonsSub = SC_TONS.map(t=>t.label).concat('Total').map((h,i)=>`<th class="sc-tons${i===0?' sc-gsep':''}">${h}</th>`).join('');
  const head2 = `<tr class="sc-sub">${recSub}${grpSub}<th class="sc-gsep">Tot Shipped</th><th>Tot Loads</th>${tonsSub}</tr>`;

  // ── data rows: Trk Recv / Pend Rail / Rail In Transit + Tons are manual inputs; the rest derived ──
  const body = rows.map(r=>{
    const d = r.date;
    const wknd = scIsWeekend(d) ? ' sc-weekend' : '';
    const isToday = d===today ? ' style="box-shadow:inset 3px 0 0 var(--accent)"' : '';
    const grpCells = SC_GROUPS.map(g=>{
      const gv = r.groups[g.key];
      const hid = scGroupHidden(g.key);
      let s = `<td class="sc-gcol sc-gsep">${cell(gv.due)}</td>`;
      if (!hid) s += `<td class="sc-gcol sc-calc">${cell(gv.prior)}</td>`+
                     `<td class="sc-gcol sc-calc">${cell(gv.dueToShip)}</td>`;
      s += `<td class="sc-gcol">${cell(gv.shipped)}</td>`;
      s += `<td class="sc-gcol sc-calc">${cell(gv.balance)}</td>`;
      return s;
    }).join('');
    const tonsCells = SC_TONS.map((t,i)=>`<td class="sc-tons${i===0?' sc-gsep':''}">${minp(d,'t/'+t.key,r.tons[t.key])}</td>`).join('')
      + `<td class="sc-tons sc-tot">${Math.round(r.tonsTotal||0)}</td>`;
    const hl = (state.scHlRows||{})[d] ? ' sc-hl' : '';
    return `<tr class="${(wknd+hl).trim()}"${isToday} onclick="scRowClick(event,'${d}')" title="Click to highlight this row">
      <td class="sc-date">${fmtScDate(d)}</td><td>${scWeekNum(d)}</td>
      <td class="sc-calc" title="Auto: Inbound loads marked COMPLETED for this date">${cell(r.trkRecv)}</td>
      <td>${minp(d,'railRecv',r.railRecv)}</td>
      <td>${minp(d,'pendRail',r.pendRail)}</td>
      <td>${minp(d,'railTransit',r.railTransit)}</td>
      <td>${minp(d,'ffti',r.ffti)}</td>
      <td>${minp(d,'pwd',r.pwd)}</td>
      ${grpCells}
      <td class="sc-tot sc-gsep">${cell(r.totalShipped)}</td>
      <td class="sc-tot">${cell(r.totalLoads)}</td>
      ${tonsCells}
    </tr>`;
  }).join('');

  // ── summary rows over CURRENT + ARREARS only (dates ≤ today); future dates excluded so
  //    pre-booked future loads don't skew the numbers ──
  const elapsed = rows.filter(r=>r.date <= today);
  const col = f => elapsed.map(f);
  const avg = arr => { const nz=arr.filter(v=>v!==0); return nz.length ? Math.round(nz.reduce((a,b)=>a+b,0)/nz.length*10)/10 : 0; };
  const sum = arr => Math.round(arr.reduce((a,b)=>a+b,0)*100)/100;
  function summaryRow(label, agg, isTotal){
    let s = `<tr class="sc-avg"><td class="sc-date">${label}</td><td></td>`;
    s += `<td>${agg(col(r=>r.trkRecv))}</td><td>${agg(col(r=>r.railRecv))}</td>`;
    // FFTI / PWD trailers are a beginning-of-day snapshot — a monthly sum would double-count, so blank in the Total row
    const fftiC = isTotal ? '' : agg(col(r=>r.ffti));
    const pwdC  = isTotal ? '' : agg(col(r=>r.pwd));
    s += `<td>${agg(col(r=>r.pendRail))}</td><td>${agg(col(r=>r.railTransit))}</td><td>${fftiC}</td><td>${pwdC}</td>`;
    SC_GROUPS.forEach(g=>{
      // Prior Pend / Due to Ship / Balance are running figures — a sum double-counts, so blank them in the Total row
      const hid     = scGroupHidden(g.key);
      const prior   = isTotal ? '' : agg(col(r=>r.groups[g.key].prior));
      const dueShip = isTotal ? '' : agg(col(r=>r.groups[g.key].dueToShip));
      const balance = isTotal ? '' : agg(col(r=>r.groups[g.key].balance));
      s += `<td class="sc-gsep">${agg(col(r=>r.groups[g.key].due))}</td>`;
      if (!hid) s += `<td class="sc-calc">${prior}</td><td class="sc-calc">${dueShip}</td>`;
      s += `<td>${agg(col(r=>r.groups[g.key].shipped))}</td>`;
      s += `<td class="sc-calc">${balance}</td>`;
    });
    s += `<td class="sc-gsep">${agg(col(r=>r.totalShipped))}</td><td>${agg(col(r=>r.totalLoads))}</td>`;
    SC_TONS.forEach((t,i)=>{ s += `<td${i===0?' class="sc-gsep"':''}>${agg(col(r=>r.tons[t.key]))}</td>`; });
    s += `<td>${agg(col(r=>r.tonsTotal))}</td></tr>`;
    return s;
  }
  const totalRow = summaryRow('Month Total', sum, true);
  const avgRow   = summaryRow('Month Avg', avg, false);

  const rptMode  = state.scReportMode || 'day';
  const rptStart = state.scReportStart || today;
  const rptEnd   = state.scReportEnd || rptStart;
  const rptOut   = state.scReportOut || 'report';
  const outOpts  = [['report','Summary Report'],['extract','Scorecard Extract (Excel)']]
    .map(([v,l])=>`<option value="${v}" ${rptOut===v?'selected':''}>${l}</option>`).join('');
  const modeOpts = [['day','Single Day'],['week','Week'],['month','Month'],['range','Custom Range']]
    .map(([v,l])=>`<option value="${v}" ${rptMode===v?'selected':''}>${l}</option>`).join('');
  view.innerHTML = `
  <div class="sc-toolbar">
    <div class="sc-boardsw">${Object.keys(SC_BOARDS).map(k=>`<button class="sc-board-pill${(state.scBoard||'6021')===k?' on':''}" onclick="scSetBoard('${k}')">${SC_BOARDS[k].label}</button>`).join('')}</div>
    <div style="display:flex;align-items:center;gap:6px">
      <button class="date-nav-btn" onclick="scShiftMonth(-1)">‹</button>
      <input type="month" value="${month}" onchange="state.scMonth=this.value;renderScorecard()"
        style="padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13px;font-weight:700;color:var(--text)">
      <button class="date-nav-btn" onclick="scShiftMonth(1)">›</button>
    </div>
    <button class="date-nav-btn" onclick="scToggleAllGroups()" title="Collapse / expand Prior Pend and Due to Ship for every customer" style="width:auto;padding:0 9px;font-size:11px;font-weight:700">\u21F9 Cols</button>
    ${Object.keys(state.scHlRows||{}).length ? `<button class="date-nav-btn" onclick="scClearHl()" title="Clear every highlighted row" style="width:auto;padding:0 9px;font-size:11px;font-weight:700">\u2715 Highlights</button>` : ''}
    <div style="font-size:13px;font-weight:800;color:var(--text);letter-spacing:.5px">${scBoard().title}</div>
    <div style="flex:1"></div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end">
      <span style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;font-weight:700">Report</span>
      <select onchange="state.scReportOut=this.value;renderScorecard()" title="Summary Report = the formatted recap. Scorecard Extract = the grid itself in Excel, minus any collapsed columns."
        style="padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:12px;font-weight:700;color:var(--text)">${outOpts}</select>
      ${rptOut==='extract' ? `<span style="font-size:11px;color:var(--text2);font-weight:700;letter-spacing:.3px" title="The extract always covers the month shown on the grid, up to today">DISPLAYED MONTH \u00b7 THROUGH TODAY</span>` : `
      <select onchange="state.scReportMode=this.value;renderScorecard()"
        style="padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:12px;font-weight:700;color:var(--text)">${modeOpts}</select>
      <input type="date" value="${rptStart}" onchange="state.scReportStart=this.value"
        style="padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:12px" title="${rptMode==='month'?'Any day in the month':rptMode==='week'?'Any day in the week':'Start date'}">
      ${rptMode==='range'?`<span style="font-size:11px;color:var(--text2)">to</span>
      <input type="date" value="${rptEnd}" onchange="state.scReportEnd=this.value"
        style="padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:12px" title="End date">`:''}
      `}
      <button class="add-load-btn ob-btn" onclick="scRunReport()">${rptOut==='extract'?'\u2913 Extract to Excel':'📄 Run Report'}</button>
    </div>
  </div>
  <div style="font-size:11px;color:var(--text2);margin-bottom:8px">
    Due Today = loads created for that date · Prior Pend = loads rolled in from earlier days · Due to Ship = Due Today + Prior Pend · Shipped = loads shipped that day · Balance = Due to Ship − Shipped (carries to the next day's Prior Pend). <b>Tot Trk Recv</b> is automatic \u2014 it counts Inbound loads marked COMPLETED for that date. Click a customer name to hide/show its Prior Pend and Due to Ship columns. Click any day row to highlight it (click again to clear). Type into the amber <b>Tons</b> and white receiving cells; press <b>Tab</b> to move to the next field.
  </div>
  <div class="sc-wrap">
    <table class="sc-table">
      <thead>${head1}${head2}</thead>
      <tbody>${body}${totalRow}${avgRow}</tbody>
    </table>
  </div>`;
}
function fmtScDate(d){
  const dt = new Date(d+'T00:00:00');
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dt.getDay()]+' '+Number(d.slice(8,10));
}
function scShiftMonth(delta){
  const [y,m] = state.scMonth.split('-').map(Number);
  const nd = new Date(y, m-1+delta, 1);
  state.scMonth = nd.getFullYear()+'-'+String(nd.getMonth()+1).padStart(2,'0');
  renderScorecard();
}

// ── Report: single day, week, month, or custom range → summary + detail-by-day ──
function scReportDates(){
  const mode = state.scReportMode||'day';
  const start = state.scReportStart || todayStr();
  const add=(ymd,n)=>{const d=new Date(ymd+'T00:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
  if (mode==='week'){ const d=new Date(start+'T00:00:00'); const mon=add(start,-((d.getDay()+6)%7)); return Array.from({length:7},(_,i)=>add(mon,i)); }
  if (mode==='month'){ const [y,m]=start.split('-').map(Number); const last=new Date(y,m,0).getDate(); return Array.from({length:last},(_,i)=>`${y}-${String(m).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`); }
  if (mode==='range'){ const end=state.scReportEnd||start; if(end<start) return [start]; const out=[]; let c=start,g=0; while(c<=end&&g<400){out.push(c);c=add(c,1);g++;} return out; }
  return [start];
}
function scFmtNice(date){ return new Date(date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function scReportLabel(dates){
  if (dates.length===1) return new Date(dates[0]+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const f=d=>new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  return f(dates[0])+' → '+f(dates[dates.length-1])+' · '+dates.length+' days';
}
// Aggregate a set of day-rows. Flows sum; snapshots (rail in transit, FFTI, PWD) show the
// last day; Due to Ship = starting pending + Σ due, so Balance = ending outstanding (reconciles).
function scReportAgg(rows){
  const groups={}; SC_GROUPS.forEach(g=>groups[g.key]={due:0,dueToShip:0,shipped:0,balance:0,tons:0});
  const tonsBy={}; SC_TONS.forEach(t=>tonsBy[t.key]=0);
  rows.forEach(r=>{ SC_TONS.forEach(t=>{ tonsBy[t.key]+=(r.tons[t.key]||0); }); });
  let trkRecv=0,railRecv=0,railToTruck=0,totalShipped=0,totalLoads=0,tonsTotal=0;
  const first=rows[0], last=rows[rows.length-1];
  rows.forEach(r=>{
    trkRecv+=r.trkRecv; railRecv+=r.railRecv; railToTruck+=r.railToTruck;
    totalShipped+=r.totalShipped; totalLoads+=r.totalLoads; tonsTotal+=r.tonsTotal;
    SC_GROUPS.forEach(g=>{ groups[g.key].due+=r.groups[g.key].due; groups[g.key].shipped+=r.groups[g.key].shipped; groups[g.key].tons+=(r.tons[g.key]||0); });
  });
  SC_GROUPS.forEach(g=>{ const fp=first?first.groups[g.key].prior:0; groups[g.key].dueToShip=fp+groups[g.key].due; groups[g.key].balance=groups[g.key].dueToShip-groups[g.key].shipped; });
  const totalPending   = SC_GROUPS.reduce((s,g)=>s+groups[g.key].balance,0);
  const totalDueToShip = SC_GROUPS.reduce((s,g)=>s+groups[g.key].dueToShip,0);
  const totalDue       = SC_GROUPS.reduce((s,g)=>s+groups[g.key].due,0);
  return { trkRecv, railRecv, railToTruck, railTransit:last?last.railTransit:0, ffti:last?last.ffti:0, pwd:last?last.pwd:0,
           groups, tonsBy, totalShipped, totalLoads, tonsTotal, totalPending, totalDueToShip, totalDue };
}
function scReportHtml(){
  // Report days to date only — within the selected period, never year to date. A month/week
  // picked in the current period stops at today, so the label reads the real span and the
  // snapshot figures (Rail In Transit, FFTI, PWD) come from today rather than a future
  // period-end. Past periods are unaffected; a wholly-future pick falls back to its full
  // span rather than reporting nothing.
  const _all    = scReportDates();
  const _toDate = _all.filter(d => d <= todayStr());
  const dates   = _toDate.length ? _toDate : _all;
  const rows = dates.map(d=>scComputeRow(d));
  const A = scReportAgg(rows);
  let logo=''; const img=document.querySelector('img[alt="Piper Warehouse"]'); if(img) logo=img.src;
  const label = scReportLabel(dates);
  const topIcons = [['Tot Trk Recv',A.trkRecv],['Tot Rail Recv',A.railRecv],['Rail In Transit',A.railTransit],['FFTI Trailer',A.ffti],['PWD Trailers',A.pwd]]
    .map(([k,v])=>`<div class="rc"><span>${k}</span><b>${v||0}</b></div>`).join('');
  const grpRows = SC_GROUPS.map(g=>{ const v=A.groups[g.key];
    return `<tr><td class="lbl">${g.label}</td><td>${v.due}</td><td>${v.dueToShip}</td><td>${v.shipped}</td><td class="bal">${v.balance}</td><td>${Math.round(v.tons||0)}</td></tr>`;
  }).join('');
  const tonsOnlyRows = SC_TONS.filter(t=>!SC_GROUPS.some(g=>g.key===t.key)).map(t=>
    `<tr><td class="lbl">${t.label} <span style="font-weight:400;opacity:.55">(tons only)</span></td><td>—</td><td>—</td><td>—</td><td class="bal">—</td><td>${Math.round((A.tonsBy||{})[t.key]||0)}</td></tr>`).join('');
  const custTotal = `<tr class="tot"><td class="lbl">TOTAL</td><td>${A.totalDue}</td><td>${A.totalDueToShip}</td><td>${A.totalShipped}</td><td class="bal">${A.totalPending}</td><td>${Math.round(A.tonsTotal||0)}</td></tr>`;
  const botIcons = [['Total Loads Shipped',A.totalShipped],['Total Loads Pending',A.totalPending],['Total Loads',A.totalLoads],['Total Tons',Math.round(A.tonsTotal||0)]]
    .map(([k,v])=>`<div class="fbox"><span>${k}</span><b>${v||0}</b></div>`).join('');
  // Detail by day — each row is THAT DAY on its own, nothing accumulates. Due to Ship is the
  // day's Due Today + Prior Pend; Balance is what was still outstanding when the day closed
  // (both already computed per group in scDeriveDay). Rail In Transit, FFTI, PWD and Tons are
  // point-in-time counts, so they show the day's own figure. Prior Pend stays hidden.
  const today = todayStr();
  const detMonth = scMonthStr(state.scReportStart||today);
  const _mDays = scDaysInMonth(detMonth);
  const _elapsed = _mDays.filter(d=>d<=today);
  const detailRows = (_elapsed.length ? _elapsed : _mDays).map(d=>scComputeRow(d));
  const _sumG = (r, f) => SC_GROUPS.reduce((s,g)=>s+f(r.groups[g.key]), 0);
  const dayRows = detailRows.map(r=>{
    const due = _sumG(r, v=>v.due);
    const dts = _sumG(r, v=>v.dueToShip);   // that day's Due Today + Prior Pend
    const shp = _sumG(r, v=>v.shipped);
    const bal = _sumG(r, v=>v.balance);     // dueToShip - shipped, end of that day
    const wke = scIsWeekend(r.date)?' class="wke"':'';
    return `<tr${wke}><td class="lbl">${scFmtNice(r.date)}</td><td>${r.trkRecv}</td><td>${r.railRecv}</td><td>${r.railTransit}</td><td>${r.ffti}</td><td>${r.pwd}</td><td>${due}</td><td>${dts}</td><td>${shp}</td><td class="bal">${bal}</td><td>${r.totalLoads}</td><td>${Math.round(r.tonsTotal)}</td></tr>`;
  }).join('');
  const detTitle = new Date(detMonth+'-01T00:00:00').toLocaleDateString('en-US',{month:'long',year:'numeric'});
  return `<div id="sc-report">
    <div class="hd">
      ${logo?`<img src="${logo}" class="logo">`:''}
      <div><div class="t1">Warehouse Scorecard</div>
      <div class="t2">Piper Warehouse &amp; Logistics · Location 6021 — Greensboro</div></div>
      <div class="dt">${label}</div>
    </div>
    <div class="recv">${topIcons}</div>
    <table class="rt">
      <thead><tr><th>Customer</th><th>Loads Due Today</th><th>Loads Due to Ship</th><th>Loads Shipped</th><th>Balance Due</th><th>Tons</th></tr></thead>
      <tbody>${grpRows}${tonsOnlyRows}${custTotal}</tbody>
    </table>
    <div class="foot">${botIcons}</div>
    <div class="detail">
      <div class="dttl">Detail by Day — ${detTitle}</div>
      <div class="dcap">Each row is that day on its own — nothing carries forward. Due to Ship = that day's Due Today + Prior Pend; Balance = still outstanding at end of day. Rail In Transit, FFTI, PWD and Tons are that day's point-in-time counts.</div>
      <table class="rt dt-table">
        <thead><tr><th>Date</th><th>Trk Recv</th><th>Rail Recv</th><th>Rail In Transit</th><th>FFTI</th><th>PWD</th><th>Due Today</th><th>Due to Ship</th><th>Shipped</th><th>Balance</th><th>Total Loads</th><th>Tons</th></tr></thead>
        <tbody>${dayRows}</tbody>
      </table>
    </div>
  </div>`;
}

function scDownloadWord(html, fname){

// ─── SCORECARD EXTRACT (Excel) ─────────────────────────────────────────
// Ships the grid itself (rather than the summary report) to .xlsx, honouring whichever
// per-customer columns are collapsed on screen. Site code comes off ROOT so 6021/6049 share this.
//
// Built as raw OOXML rather than via SheetJS: the free SheetJS build writes cell values but
// drops cell styles and frozen panes, and we want bold headers, bold Total/Avg and frozen
// header rows. Everything below is self-contained — no extra library needed.

function scSiteCode(){ const p = String(ROOT||'').split('/'); return p[p.length-1] || ''; }
function scGroupHeads(k){
  return scGroupHidden(k) ? ['Due Today','Shipped','Balance']
                          : ['Due Today','Prior Pend','Due to Ship','Shipped','Balance'];
}
// Excel serial date (1900 system); built from Y/M/D so it can't be shifted by the timezone.
function scXlSerial(ymd){
  const p = String(ymd).split('-').map(Number);
  return Math.floor((Date.UTC(p[0], p[1]-1, p[2]) - Date.UTC(1899,11,30)) / 86400000);
}

// ── tiny ZIP writer (store method — Excel reads uncompressed entries fine) ──
const _SC_CRC = (function(){
  const t = new Int32Array(256);
  for (let n=0;n<256;n++){ let c=n; for (let k=0;k<8;k++) c = (c & 1) ? (0xEDB88320 ^ (c>>>1)) : (c>>>1); t[n]=c; }
  return t;
})();
function scCrc32(b){ let c=-1; for (let i=0;i<b.length;i++) c = _SC_CRC[(c ^ b[i]) & 0xFF] ^ (c>>>8); return (c ^ -1)>>>0; }
function scZip(files){
  const enc = new TextEncoder();
  const parts = [], central = [];
  let offset = 0;
  files.forEach(f=>{
    const name = enc.encode(f.name), data = enc.encode(f.xml);
    const crc = scCrc32(data), n = data.length;
    const lh = new Uint8Array(30 + name.length), lv = new DataView(lh.buffer);
    lv.setUint32(0, 0x04034b50, true); lv.setUint16(4, 20, true); lv.setUint16(6, 0, true);
    lv.setUint16(8, 0, true); lv.setUint16(10, 0, true); lv.setUint16(12, 0, true);
    lv.setUint32(14, crc, true); lv.setUint32(18, n, true); lv.setUint32(22, n, true);
    lv.setUint16(26, name.length, true); lv.setUint16(28, 0, true);
    lh.set(name, 30);
    parts.push(lh, data);
    const ch = new Uint8Array(46 + name.length), cv = new DataView(ch.buffer);
    cv.setUint32(0, 0x02014b50, true); cv.setUint16(4, 20, true); cv.setUint16(6, 20, true);
    cv.setUint16(8, 0, true); cv.setUint16(10, 0, true); cv.setUint16(12, 0, true); cv.setUint16(14, 0, true);
    cv.setUint32(16, crc, true); cv.setUint32(20, n, true); cv.setUint32(24, n, true);
    cv.setUint16(28, name.length, true); cv.setUint16(30, 0, true); cv.setUint16(32, 0, true);
    cv.setUint16(34, 0, true); cv.setUint16(36, 0, true); cv.setUint32(38, 0, true);
    cv.setUint32(42, offset, true);
    ch.set(name, 46);
    central.push(ch);
    offset += lh.length + n;
  });
  const cdSize = central.reduce((s,c)=>s+c.length, 0);
  const end = new Uint8Array(22), ev = new DataView(end.buffer);
  ev.setUint32(0, 0x06054b50, true); ev.setUint16(4, 0, true); ev.setUint16(6, 0, true);
  ev.setUint16(8, files.length, true); ev.setUint16(10, files.length, true);
  ev.setUint32(12, cdSize, true); ev.setUint32(16, offset, true); ev.setUint16(20, 0, true);
  const all = parts.concat(central, [end]);
  const total = all.reduce((s,a)=>s+a.length, 0);
  const out = new Uint8Array(total);
  let p = 0; all.forEach(a=>{ out.set(a, p); p += a.length; });
  return out;
}

function scColLetter(i){ let s=''; let n=i+1; while(n>0){ const m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=(n-m-1)/26; } return s; }
function scXmlEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function scExtractAoA(dates){
  const rows  = dates.map(d=>scComputeRow(d));
  const today = todayStr();
  const cell  = v => Math.round((v||0)*100)/100;
  const RECV  = ['Tot Trk Recv','Tot Rail Recv','Pend Rail Yard','Rail In Transit','FFTI Trlrs','PWD Trlrs'];
  const TKEYS = SC_TONS.map(t=>t.key);
  const HDR   = 3;                                   // rows 0-2 = title / range / spacer

  // header bands + sub headers (collapsed columns are simply never emitted)
  const band = ['Date','Wk'], sub = ['',''], merges = [], sepCols = [];
  // sep = the heavy divider that opens a subset on screen (each customer + the Totals block)
  const push = (label, heads, sep) => {
    const c0 = band.length;
    if (sep) sepCols.push(c0);
    band.push(label); for (let i=1;i<heads.length;i++) band.push('');
    heads.forEach(h=>sub.push(h));
    if (heads.length>1) merges.push({s:{r:HDR,c:c0},e:{r:HDR,c:c0+heads.length-1}});
  };
  merges.push({s:{r:HDR,c:0},e:{r:HDR+1,c:0}});      // Date spans both header rows
  merges.push({s:{r:HDR,c:1},e:{r:HDR+1,c:1}});      // Wk
  push('Receiving', RECV, false);
  SC_GROUPS.forEach(g=>push(g.label, scGroupHeads(g.key), true));
  push('Totals', ['Tot Shipped','Tot Loads'], true);
  push('Tons (AM of day of)', SC_TONS.map(t=>t.label).concat('Total'), true);

  // one row per day — real Excel date in col A so it sorts/filters/pivots
  const dayRow = r => {
    const o = [{ d: scXlSerial(r.date) }, scWeekNum(r.date)];
    o.push(cell(r.trkRecv), cell(r.railRecv), cell(r.pendRail), cell(r.railTransit), cell(r.ffti), cell(r.pwd));
    SC_GROUPS.forEach(g=>{
      const gv = r.groups[g.key];
      o.push(cell(gv.due));
      if (!scGroupHidden(g.key)) o.push(cell(gv.prior), cell(gv.dueToShip));
      o.push(cell(gv.shipped), cell(gv.balance));
    });
    o.push(cell(r.totalShipped), cell(r.totalLoads));
    TKEYS.forEach(k=>o.push(cell(r.tons[k])));
    o.push(Math.round(r.tonsTotal||0));
    return o;
  };

  // Total / Avg over elapsed days only, with the same blanking rules as the on-screen summary
  const elapsed = rows.filter(r=>r.date<=today);
  const col = f => elapsed.map(f);
  const avg = a => { const nz=a.filter(v=>v!==0); return nz.length ? Math.round(nz.reduce((x,y)=>x+y,0)/nz.length*10)/10 : 0; };
  const sum = a => Math.round(a.reduce((x,y)=>x+y,0)*100)/100;
  const sumRow = (label, agg, isTotal) => {
    const o = [label,''];
    o.push(agg(col(r=>r.trkRecv)), agg(col(r=>r.railRecv)), agg(col(r=>r.pendRail)), agg(col(r=>r.railTransit)),
           isTotal?'':agg(col(r=>r.ffti)), isTotal?'':agg(col(r=>r.pwd)));
    SC_GROUPS.forEach(g=>{
      o.push(agg(col(r=>r.groups[g.key].due)));
      if (!scGroupHidden(g.key)) o.push(isTotal?'':agg(col(r=>r.groups[g.key].prior)),
                                        isTotal?'':agg(col(r=>r.groups[g.key].dueToShip)));
      o.push(agg(col(r=>r.groups[g.key].shipped)), isTotal?'':agg(col(r=>r.groups[g.key].balance)));
    });
    o.push(agg(col(r=>r.totalShipped)), agg(col(r=>r.totalLoads)));
    TKEYS.forEach(k=>o.push(agg(col(r=>r.tons[k]))));
    o.push(agg(col(r=>r.tonsTotal)));
    return o;
  };

  const aoa = [[scBoard().short+' \u00b7 Piper Warehouse Daily Scorecard'], [scReportLabel(dates)], []]
    .concat([band, sub], rows.map(dayRow), [sumRow('Total', sum, true), sumRow('Avg', avg, false)]);
  const width = band.length;
  merges.unshift({s:{r:0,c:0},e:{r:0,c:width-1}}, {s:{r:1,c:0},e:{r:1,c:width-1}});
  const cols = [{wch:12},{wch:5}].concat(Array.from({length:width-2}, ()=>({wch:10})));
  // bold: title, range label, both header rows, and the two summary rows
  const boldRows = [0, 1, HDR, HDR+1, aoa.length-2, aoa.length-1];
  return { aoa, merges, cols, boldRows, sepCols, width, freezeRow: HDR+2, freezeCol: 2 };
}

function scExtractSheetXml(x){
  const bold = {}; x.boldRows.forEach(r=>bold[r]=true);
  const sep = {}; (x.sepCols||[]).forEach(c=>sep[c]=true);
  // xf ids: 0 plain · 1 bold · 2 date · 3 divider · 4 bold+divider
  const styleOf = (r,c) => bold[r] ? (sep[c] ? 4 : 1) : (sep[c] ? 3 : 0);
  let sd = '';
  x.aoa.forEach((row,r)=>{
    let cells = '';
    row.forEach((v,c)=>{
      if (v===null || v===undefined || v==='') return;
      const ref = scColLetter(c)+(r+1);
      if (v && typeof v === 'object' && v.d !== undefined){
        cells += '<c r="'+ref+'" s="2"><v>'+v.d+'</v></c>';           // date cell (col A, never a divider)
      } else {
        const st = styleOf(r,c);
        const sAttr = st ? ' s="'+st+'"' : '';
        if (typeof v === 'number') cells += '<c r="'+ref+'"'+sAttr+'><v>'+v+'</v></c>';
        else cells += '<c r="'+ref+'"'+sAttr+' t="inlineStr"><is><t xml:space="preserve">'+scXmlEsc(v)+'</t></is></c>';
      }
    });
    if (cells) sd += '<row r="'+(r+1)+'">'+cells+'</row>';
  });
  const colsXml = '<cols>' + x.cols.map((c,i)=>'<col min="'+(i+1)+'" max="'+(i+1)+'" width="'+c.wch+'" customWidth="1"/>').join('') + '</cols>';
  const mergeXml = x.merges.length
    ? '<mergeCells count="'+x.merges.length+'">' + x.merges.map(m=>'<mergeCell ref="'+scColLetter(m.s.c)+(m.s.r+1)+':'+scColLetter(m.e.c)+(m.e.r+1)+'"/>').join('') + '</mergeCells>'
    : '';
  const topLeft = scColLetter(x.freezeCol)+(x.freezeRow+1);
  const pane = '<pane xSplit="'+x.freezeCol+'" ySplit="'+x.freezeRow+'" topLeftCell="'+topLeft+'" activePane="bottomRight" state="frozen"/>'
             + '<selection pane="bottomRight" activeCell="'+topLeft+'" sqref="'+topLeft+'"/>';
  const dim = 'A1:'+scColLetter(x.width-1)+x.aoa.length;
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'
    + '<dimension ref="'+dim+'"/>'
    + '<sheetViews><sheetView tabSelected="1" workbookViewId="0">'+pane+'</sheetView></sheetViews>'
    + '<sheetFormatPr defaultRowHeight="15"/>'
    + colsXml + '<sheetData>' + sd + '</sheetData>' + mergeXml
    + '</worksheet>';
}

function scExportExtract(dates){
  try {
    const x = scExtractAoA(dates);
    const bytes = scZip(scExtractFiles(x));
    const tag = dates.length===1 ? dates[0] : (dates[0]+'_to_'+dates[dates.length-1]);
    const blob = new Blob([bytes], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'Piper-'+scSiteCode()+scBoard().tag+'-Scorecard-'+tag+'.xlsx';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ try{ document.body.removeChild(a); }catch(e){} URL.revokeObjectURL(url); }, 0);
    showAlert('Scorecard extract downloaded','success');
  } catch(e){ showAlert('Could not build the extract: '+e.message,'warning'); }
}

// The extract mirrors the grid on screen: the month being displayed, through today. Future
// days are left out (they carry no data yet); a month wholly in the future extracts in full so
// the file is never empty. Deliberately independent of the Summary Report's date-mode pick.
function scExtractDates(){
  const days   = scDaysInMonth(state.scMonth || scMonthStr(todayStr()));
  const toDate = days.filter(d => d <= todayStr());
  return toDate.length ? toDate : days;
}

function scRunReport(){
  const dates = scReportDates();
  if (!dates.length){ showAlert('Pick a valid date range for the report.','warning'); return; }
  if ((state.scReportOut||'report')==='extract'){ scExportExtract(scExtractDates()); return; }
  const html = scReportHtml();
  const fname = dates.length===1 ? dates[0] : (dates[0]+'_to_'+dates[dates.length-1]);
  const win = window.open('','_blank');
  if (!win){ showAlert('Allow pop-ups to open the report.','warning'); return; }
  win.document.write('<html><head><title>Scorecard '+fname+'</title><style>'+SC_REPORT_CSS+
    '.tb{position:sticky;top:0;display:flex;gap:8px;justify-content:flex-end;padding:10px;background:#eef2f8;border-bottom:1px solid #cfd6e4}'+
    '.tb button{padding:8px 16px;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-family:Arial}'+
    '.tb .p{background:#1a3a6b;color:#fff}.tb .w{background:#1d6f42;color:#fff}'+
    '@media print{.tb{display:none}}</style></head><body>'+
    '<div class="tb no-print"><button class="p" onclick="window.print()">🖨 Print / Save PDF</button>'+
    '<button class="w" onclick="dlWord()">⬇ Download Word</button></div>'+html+
    '<script>function dlWord(){window.opener && window.opener.scDownloadWord('+JSON.stringify(html)+','+JSON.stringify(fname)+');}<\/script>'+
    '</body></html>');
  win.document.close();
}

// ─── YARD CHECK EXPORT (print preview → Word / print) ──────────────────
// Builds the physical "Dock – Trailer Assignment Sheet" (doors 15–51 with the
// special labels), pre-filled with the app's current trailer/order per door,
// then opens a print preview that can print or download a Word (.doc) file.
const YARD_SPECIAL = { 15:'DO NOT USE', 25:'TRASH COMPACTOR', 39:'RAMP', 48:'RECYCLE' };

function fmtStamp(ts){
  if(!ts) return '';
  try { return new Date(ts).toLocaleString('en-US',{month:'numeric',day:'numeric',year:'2-digit',hour:'numeric',minute:'2-digit'}); }
  catch(e){ return ''; }
}

function buildYardSheetRows() {
  pruneStaleDoors();
  const doors = state.yard.doors||{};
  const liveDoors = {};
  Object.values(state.inbound||{}).forEach(r => { if (r.door && r.trailer && r.status!=='COMPLETED') liveDoors[String(r.door).trim()] = { trailer:r.trailer||'', order:r.loadNum||'' }; });
  Object.values(state.outbound||{}).forEach(r => { if (r.door && r.trailer && r.status!=='DEPARTED') liveDoors[String(r.door).trim()] = { trailer:r.trailer||'', order:r.orderNum||'' }; });
  const rows = [];
  for (let n=15; n<=51; n++) {
    if (YARD_SPECIAL[n]) { rows.push({ door:n, special:YARD_SPECIAL[n] }); continue; }
    const d = doors[n]||{}; const live = liveDoors[String(n)];
    const man = !live && !!d.trailer;
    rows.push({ door:n, trailer:(live?live.trailer:(d.trailer||'')), order:(live?live.order:(d.order||'')), manual:man, by:(man?(d.enteredBy||''):''), at:(man?(d.enteredAt||0):0) });
  }
  return rows;
}

const YARD_SHEET_CSS =
  'body{font-family:Arial,Helvetica,sans-serif;color:#1a2035;margin:0;}'
+ '.hdr-tbl{width:100%;border-collapse:collapse;border-bottom:2px solid #7a1f1f;margin-bottom:6px;}'
+ '.hdr-tbl td{vertical-align:middle;padding:2px 6px;}'
+ '.logo{height:46px;width:auto;}'
+ '.title{font-size:18px;font-weight:bold;color:#1a3a6b;}'
+ '.sub{font-size:10px;color:#555;margin-top:1px;}'
+ '.hdr-date{text-align:right;font-size:10px;color:#555;white-space:nowrap;}'
+ '.meta{font-size:11px;margin:4px 0 7px;}'
+ 'table.grid{width:100%;border-collapse:collapse;}'
+ '.grid th,.grid td{border:1px solid #555;padding:2px 8px;font-size:13px;height:0.23in;}'
+ '.grid th{background:#1a3a6b;color:#fff;text-align:left;}'
+ '.cdoor{width:48px;text-align:center;font-weight:bold;background:#eef1f7;}'
+ '.special{text-align:center;font-weight:bold;color:#b91c1c;letter-spacing:1px;}'
+ '.ment{font-size:10px;color:#555;white-space:nowrap;}'
+ 'thead{display:table-header-group;} tr{page-break-inside:avoid;}';

function yardSheetHtml() {
  const logoEl = document.querySelector('img[alt="Piper Warehouse"]');
  const logo = logoEl ? logoEl.src : '';
  const today = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const body = buildYardSheetRows().map(r => r.special
    ? '<tr><td class="cdoor">'+r.door+'</td><td class="special" colspan="3">'+r.special+'</td></tr>'
    : '<tr><td class="cdoor">'+r.door+'</td><td>'+(r.trailer||'')+'</td><td>'+(r.order||'')+'</td><td class="ment">'+(r.manual?((r.by?String(r.by).replace(/</g,'&lt;'):'')+(r.at?((r.by?' · ':'')+fmtStamp(r.at)):'')):'')+'</td></tr>'
  ).join('');
  const logoImg = logo ? '<img src="'+logo+'" class="logo" alt="Piper Warehouse">' : '';
  return '<div id="sheet">'
    + '<table class="hdr-tbl"><tr>'
    + '<td style="width:90px">'+logoImg+'</td>'
    + '<td><div class="title">Dock &ndash; Trailer Assignment Sheet</div>'
    + '<div class="sub">Piper Warehouse &amp; Logistics &middot; Location 6021 &mdash; Greensboro</div></td>'
    + '<td class="hdr-date">'+today+'</td>'
    + '</tr></table>'
    + '<div class="meta">Shift: ____________ &nbsp;&nbsp; Completed by: ____________________ &nbsp;&nbsp; Reviewed by: ____________</div>'
    + '<table class="grid"><thead><tr><th class="cdoor">Door</th><th>Trailer #</th><th>IB / OB Order #</th><th>Manually Entered</th></tr></thead>'
    + '<tbody>'+body+'</tbody></table></div>';
}

function downloadYardWord(sheetHtml) {
  const head = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">'
    + '<head><meta charset="utf-8"><title>Dock Trailer Assignment Sheet</title>'
    + '<style>@page{size:8.5in 11in;mso-page-orientation:portrait;margin:0.5in;}' + YARD_SHEET_CSS + '</style></head><body>';
  const full = head + sheetHtml + '</body></html>';
  const blob = new Blob(['\ufeff', full], { type:'application/msword' });
  const url = URL.createObjectURL(blob);
  const now = new Date(); const pad = x => String(x).padStart(2,'0');
  const stamp = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  const a = document.createElement('a'); a.href = url; a.download = 'Piper-6021-Trailer-Assignment-'+stamp+'.doc';
  document.body.appendChild(a); a.click(); setTimeout(()=>{ try{document.body.removeChild(a);}catch(e){} URL.revokeObjectURL(url); },0);
  showAlert('Word document downloaded','success');
}

function exportYardCheck() {
  const sheet = yardSheetHtml();
  const previewHtml = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Dock &ndash; Trailer Assignment Sheet</title><style>'
    + YARD_SHEET_CSS
    + '@page{size:8.5in 11in;margin:0.5in;}'
    + '@media print{.no-print{display:none!important;} html,body{margin:0;} .page{padding:0!important;max-width:none;}}'
    + '.toolbar{position:sticky;top:0;background:#1a3a6b;padding:10px 14px;display:flex;gap:10px;align-items:center;}'
    + '.toolbar .ttl{color:#fff;font:600 13px Arial;margin-right:auto;}'
    + '.toolbar button{font:600 13px Arial;padding:8px 14px;border:none;border-radius:6px;cursor:pointer;}'
    + '.b-print{background:#1d6f42;color:#fff;} .b-word{background:#fff;color:#1a3a6b;}'
    + '.page{padding:26px;max-width:8.5in;margin:0 auto;background:#fff;}'
    + 'body{background:#e9edf4;}'
    + '</style></head><body>'
    + '<div class="toolbar no-print"><span class="ttl">Yard Check &mdash; Trailer Assignment Sheet</span>'
    + '<button class="b-print" id="btn-print">Print / Save PDF</button>'
    + '<button class="b-word" id="btn-word">Download Word (.doc)</button></div>'
    + '<div class="page">' + sheet + '</div></body></html>';
  const w = window.open('', '_blank');
  if (!w) { downloadYardWord(sheet); showAlert('Pop-up blocked — downloaded the Word doc instead','warning'); return; }
  w.document.open(); w.document.write(previewHtml); w.document.close();
  const wire = () => { try {
    const tb = w.document.querySelector('.toolbar');
    // Scale the sheet so the whole grid prints on ONE physical page, regardless
    // of the browser's print margins / header-footer band. Measured at print time.
    const fitOnePage = () => { try {
      const sheet = w.document.getElementById('sheet');
      if (!sheet) return;
      sheet.style.zoom = '1';
      const h = sheet.getBoundingClientRect().height;      // px @96dpi
      const target = 9.4 * 96;                            // fill more of the page (room observed below door 51)
      if (h > target) sheet.style.zoom = (target / h).toFixed(3);
    } catch(e){} };
    const resetFit = () => { try { const s = w.document.getElementById('sheet'); if (s) s.style.zoom = '1'; } catch(e){} };
    const bp = w.document.getElementById('btn-print'); if (bp) bp.onclick = () => { fitOnePage(); w.print(); };
    const bw = w.document.getElementById('btn-word');  if (bw) bw.onclick = () => downloadYardWord(sheet);
    w.onbeforeprint = () => { if (tb) tb.style.display = 'none'; fitOnePage(); };
    w.onafterprint  = () => { if (tb) tb.style.display = ''; resetFit(); };
  } catch(e){} };
  if (w.document.readyState === 'complete') wire(); else w.onload = wire;
  setTimeout(wire, 300);
}
