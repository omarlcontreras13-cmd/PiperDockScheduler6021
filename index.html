// ─── EXCEL IMPORT (one-time SharePoint workbook → app seed) ──────────────
// Mirrors the live 6021 Greensboro dock-schedule workbook layout:
//   - 2026_6021_INBOUND  : inbound side, columns B..O
//   - 2026_6021_OUTBOUND : outbound side, columns P..AF
// Both sides are calendar grids: each day is a block whose date sits in the
// first column of the block; load rows below it are real only when a
// customer / load# / order# is present.

const IB_COL = { status:1, customer:2, location:3, loadNum:4, reqDateCol:5, apptTime:6, timeIn:7, timeOut:8, door:11, trailer:12, carrier:13, notes:14 }; // 0-based (B=1 ... O=14)
const OB_COL = { status:15, customer:16, orderNum:17, reqDateCol:19, destination:18, apptTime:20, timeIn:21, timeOut:22, picker:25, stageLoc:26, loader:27, door:28, trailer:29, carrier:30, notes:31 }; // P=15 ... AF=31

function xlsxVal(v) {
  // Returns {kind:'date', s:'YYYY-MM-DD'} | {kind:'time', s:'HH:MM'} | {kind:'text', s:'...'} | null
  if (v === null || v === undefined || v === '') return null;
  if (v instanceof Date) {
    if (v.getFullYear() < 1901) {              // Excel time-only serial → epoch 1899-12-30
      const hh = String(v.getHours()).padStart(2,'0');
      const mm = String(v.getMinutes()).padStart(2,'0');
      return { kind:'time', s: hh+':'+mm };
    }
    const y=v.getFullYear(), m=String(v.getMonth()+1).padStart(2,'0'), d=String(v.getDate()).padStart(2,'0');
    return { kind:'date', s:`${y}-${m}-${d}` };
  }
  if (typeof v === 'number') {                  // fallback: bare time fraction of a day
    if (v > 0 && v < 1) {
      const mins = Math.round(v*24*60);
      const hh = String(Math.floor(mins/60)).padStart(2,'0');
      const mm = String(mins%60).padStart(2,'0');
      return { kind:'time', s: hh+':'+mm };
    }
    return { kind:'text', s:String(v).trim() };
  }
  return { kind:'text', s:String(v).trim() };
}
function asTime(v){ const o=xlsxVal(v); if(!o) return ''; return o.kind==='time' && o.s!=='00:00' ? o.s : ''; }
function asText(v){ const o=xlsxVal(v); return o ? o.s : ''; }

const IB_STATUS_MAP = { 'COMPLETED':'COMPLETED','UNLOADING':'UNLOADING','ARRIVED':'ARRIVED','SCHEDULED':'SCHEDULED' };
const OB_STATUS_MAP = {
  'ORDER RECEIVED':'ORDER RECEIVED','PICK TICKET':'PICK TICKET','PICK TICKET CREATED':'PICK TICKET',
  'BEING PICKED':'BEING PICKED','PICKED & STAGED':'PICKED & STAGED','LOADING':'LOADING',
  'LOADED':'LOADED','DEPARTED':'DEPARTED','COMPLETED':'DEPARTED'
};

function parseSide(rows, COL, realKeys, statusMap, defaultStatus, sideFields) {
  const out = [];
  let curDate = null;
  for (const row of rows) {
    if (!row) continue;
    const dcell = xlsxVal(row[COL.status]);          // block date / marker / status live in first col of side
    if (dcell && dcell.kind === 'date') { curDate = dcell.s; continue; }
    if (dcell && dcell.kind === 'text' && /LOADS/i.test(dcell.s)) continue; // summary marker row
    if (!curDate) continue;
    // real load if any identifying field present
    const hasReal = realKeys.some(k => { const t = asText(row[COL[k]]); return t && t !== '' ; });
    if (!hasReal) continue;
    // skip repeated in-grid header rows
    const cust = asText(row[COL.customer]);
    if (cust === 'CUSTOMER' || asText(row[COL.status]) === 'STATUS') continue;

    const rec = { reqDate: curDate, createdAt: Date.now(), updatedAt: Date.now(), source:'excel-import' };
    // Original requested date = the per-row REQ DATE column when present and sane.
    // A REQ DATE a few days off the block date is a real roll; one that's ~a year+ off
    // (e.g. 2025/2205/2000 year-typos) is ignored and we keep the block date instead.
    let origDate = curDate;
    if (COL.reqDateCol != null) {
      const rd = xlsxVal(row[COL.reqDateCol]);
      if (rd && rd.kind === 'date') {
        const days = Math.abs((new Date(rd.s) - new Date(curDate)) / 86400000);
        if (days <= 120) origDate = rd.s;
      }
    }
    rec.origReqDate = origDate;
    for (const f of sideFields) {
      if (f === 'apptTime' || f === 'timeIn' || f === 'timeOut') rec[f] = asTime(row[COL[f]]);
      else rec[f] = asText(row[COL[f]]);
    }
    if (rec.apptTime === 'NO APPT' || rec.apptTime === 'DNH' || rec.apptTime === 'TOTAL') rec.apptTime = '';
    const rawStatus = asText(row[COL.status]).toUpperCase();
    rec.status = statusMap[rawStatus] || defaultStatus;
    out.push(rec);
  }
  return out;
}

function extractWorkbook(wb) {
  const ibSheet = wb.Sheets['2026_6021_INBOUND'];
  const obSheet = wb.Sheets['2026_6021_OUTBOUND'];
  if (!ibSheet || !obSheet)
    throw new Error('Could not find sheets "2026_6021_INBOUND" / "2026_6021_OUTBOUND". Make sure you selected the 6021 Greensboro workbook.');
  // Force each sheet to read from column A so column indices line up
  // (the inbound sheet's used range starts at column B, which would shift everything).
  const fullRange = ws => { const r = XLSX.utils.decode_range(ws['!ref']); r.s.r = 0; r.s.c = 0; return XLSX.utils.encode_range(r); };
  const opt = ws => ({ header:1, raw:true, defval:null, blankrows:true, range: fullRange(ws) });
  const ibRows = XLSX.utils.sheet_to_json(ibSheet, opt(ibSheet));
  const obRows = XLSX.utils.sheet_to_json(obSheet, opt(obSheet));
  const inbound  = parseSide(ibRows, IB_COL, ['customer','loadNum'],  IB_STATUS_MAP, 'SCHEDULED',
                    ['customer','location','loadNum','apptTime','timeIn','timeOut','door','trailer','carrier','notes']);
  const outbound = parseSide(obRows, OB_COL, ['customer','orderNum'], OB_STATUS_MAP, 'ORDER RECEIVED',
                    ['customer','orderNum','destination','apptTime','timeIn','timeOut','picker','stageLoc','loader','door','trailer','carrier','notes']);
  return { inbound, outbound };
}

let _pendingImport = null;

let _pendingTable = null;
function tableHeaderKey(h) {
  const u = String(h||'').toUpperCase().trim();
  if (u.indexOf('OPERATOR')>-1) return 'operators';
  if (u.indexOf('CUSTOMER')>-1 && u.indexOf('IN')>-1) return 'customerIB';
  if (u.indexOf('CUSTOMER')>-1 && u.indexOf('OUT')>-1) return 'customerOB';
  if (u.indexOf('STAG')>-1) return 'stageLane';
  if (u.indexOf('DOOR')>-1) return 'door';
  if (u.indexOf('OUTBOUND')>-1 && u.indexOf('STA')>-1) return 'outStatus';
  if (u.indexOf('INBOUND')>-1 && u.indexOf('STA')>-1) return 'inStatus';
  return null;
}
function extractTable(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, raw:true, defval:null, blankrows:false });
  if (!rows.length) return {};
  const headers = rows[0];
  const out = {};
  headers.forEach((h, ci) => {
    const key = tableHeaderKey(h);
    if (!key) return;
    const vals = [];
    for (let r=1; r<rows.length; r++) {
      let v = rows[r][ci];
      if (v===null || v===undefined || String(v).trim()==='') continue;
      v = String(v).trim().toUpperCase();
      if (vals.indexOf(v)===-1) vals.push(v);
    }
    if (vals.length) out[key] = vals;
  });
  return out;
}
const TABLE_LABELS = { operators:'Operators', customerIB:'Customer (Inbound)', customerOB:'Customer (Outbound)', door:'Doors', stageLane:'Staging Lanes', outStatus:'Outbound Status', inStatus:'Inbound Status' };
function showTableImportModal() {
  if (!state.user || state.user.role !== 'admin') { showAlert('Admin only','warning'); return; }
  _pendingTable = null;
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="max-width:560px">
        <h2 style="margin:0 0 4px">Update Dropdown Table</h2>
        <p style="color:var(--text2);font-size:13px;margin:0 0 16px">
          Load the Dock Scheduler Table workbook to refresh the dropdown options
          (operators, customers, doors, staging lanes). This updates the lists for everyone.
        </p>
        <input type="file" id="table-file" accept=".xlsx,.xlsm" onchange="previewTableImport(event)"
          style="display:block;width:100%;padding:10px;border:1px dashed var(--border);border-radius:8px;margin-bottom:14px">
        <div id="table-preview" style="font-size:13px"></div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px">
          <button class="sign-out-btn" onclick="closeModal()">Cancel</button>
          <button class="sign-out-btn" id="table-go" disabled
            style="background:#0d9488;color:#fff;border-color:#0d9488;opacity:.5"
            onclick="runTableImport()">Update Table</button>
        </div>
      </div>
    </div>`;
}
function previewTableImport(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const prev = document.getElementById('table-preview');
  prev.innerHTML = '<span style="color:var(--text2)">Reading table…</span>';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array' });
      const data = extractTable(wb);
      const keys = Object.keys(data);
      if (!keys.length) { prev.innerHTML = '<span style="color:var(--danger)">No recognizable columns found. Expected headers like OPERATORS, CUSTOMER INBOUND, DOOR, STAGING LANE…</span>'; return; }
      _pendingTable = data;
      prev.innerHTML = `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px">
        ${keys.map(k=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)">
          <span style="color:var(--text2)">${TABLE_LABELS[k]||k}</span>
          <span style="font-weight:700">${data[k].length} options</span></div>`).join('')}
      </div>`;
      const go = document.getElementById('table-go');
      go.disabled = false; go.style.opacity = '1';
    } catch(err) {
      prev.innerHTML = `<span style="color:var(--danger)">Could not read file: ${err.message}</span>`;
    }
  };
  reader.readAsArrayBuffer(file);
}
function runTableImport() {
  if (!_pendingTable) return;
  const go = document.getElementById('table-go');
  go.disabled = true; go.textContent = 'Updating…';
  db.ref(ROOT+'/refTable').set(_pendingTable)
    .then(()=>{ closeModal(); showAlert('Dropdown table updated','success'); })
    .catch(e=>{ showAlert('Update failed: '+e.message,'danger'); go.disabled=false; go.textContent='Update Table'; });
}

function showImportModal() {
  if (!state.user || state.user.role !== 'admin') { showAlert('Admin only','warning'); return; }
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="max-width:560px">
        <h2 style="margin:0 0 4px">Import from Excel</h2>
        <p style="color:var(--text2);font-size:13px;margin:0 0 16px">
          Seed the scheduler from the live 6021 Greensboro dock-schedule workbook.
          Export/download the latest file from SharePoint, then select it here.
        </p>
        <input type="file" id="import-file" accept=".xlsx,.xlsm" onchange="previewImport(event)"
          style="display:block;width:100%;padding:10px;border:1px dashed var(--border);border-radius:8px;margin-bottom:14px">
        <div id="import-preview" style="font-size:13px"></div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px">
          <button class="sign-out-btn" onclick="closeModal()">Cancel</button>
          <button class="sign-out-btn" id="import-go" disabled
            style="background:var(--inbound);color:#fff;border-color:var(--inbound);opacity:.5"
            onclick="runImport()">Import</button>
        </div>
      </div>
    </div>`;
}

function previewImport(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const prev = document.getElementById('import-preview');
  prev.innerHTML = '<span style="color:var(--text2)">Reading workbook…</span>';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array', cellDates:true });
      const data = extractWorkbook(wb);
      _pendingImport = data;
      const ibDates = new Set(data.inbound.map(r=>r.reqDate));
      const obDates = new Set(data.outbound.map(r=>r.reqDate));
      const allDates = [...new Set([...ibDates, ...obDates])].sort();
      const range = allDates.length ? `${allDates[0]} → ${allDates[allDates.length-1]}` : '—';
      const sample = (data.inbound[0]||data.outbound[0]);
      prev.innerHTML = `
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px">
          <div style="display:flex;gap:24px;margin-bottom:10px">
            <div><div style="font-size:22px;font-weight:800;color:var(--inbound)">${data.inbound.length}</div>
                 <div style="font-size:11px;color:var(--text2)">INBOUND LOADS</div></div>
            <div><div style="font-size:22px;font-weight:800;color:var(--outbound)">${data.outbound.length}</div>
                 <div style="font-size:11px;color:var(--text2)">OUTBOUND LOADS</div></div>
            <div><div style="font-size:22px;font-weight:800">${allDates.length}</div>
                 <div style="font-size:11px;color:var(--text2)">DATES</div></div>
          </div>
          <div style="font-size:12px;color:var(--text2)">Date range: <b style="color:var(--text)">${range}</b></div>
          ${sample?`<div style="font-size:11px;color:var(--text2);margin-top:8px">Sample: ${sample.reqDate} · ${sample.customer||''} · ${sample.loadNum||sample.orderNum||''} · ${sample.apptTime||'no appt'} · ${sample.status}</div>`:''}
          <label style="display:flex;align-items:center;gap:8px;margin-top:12px;font-size:12px;cursor:pointer">
            <input type="checkbox" id="import-clear"> Clear existing inbound & outbound first (clean seed)
          </label>
        </div>`;
      const go = document.getElementById('import-go');
      go.disabled = false; go.style.opacity = '1';
    } catch (err) {
      _pendingImport = null;
      prev.innerHTML = `<div style="color:var(--danger);font-size:13px">${err.message}</div>`;
      const go = document.getElementById('import-go'); go.disabled = true; go.style.opacity='.5';
    }
  };
  reader.readAsArrayBuffer(file);
}

async function runImport() {
  if (!_pendingImport) return;
  const go = document.getElementById('import-go');
  go.disabled = true; go.textContent = 'Importing…';
  const clearFirst = (document.getElementById('import-clear')||{}).checked;
  try {
    // Preserve FFTI statuses set by the remote user (who has no spreadsheet access):
    // ASSIGNED / DRIVER IN ROUTE overrides — and their driver name — are kept through the import.
    const preserve = {};
    Object.values(state.outbound||{}).forEach(r => {
      if (r && (r.ffStatus === 'ASSIGNED' || r.ffStatus === 'DRIVER IN ROUTE')) {
        const key = (r.orderNum||'').toString().trim().toUpperCase();
        if (key) preserve[key] = { ffStatus: r.ffStatus, driver: r.driver||'' };
      }
    });
    (_pendingImport.outbound||[]).forEach(r => {
      const key = (r.orderNum||'').toString().trim().toUpperCase();
      if (key && preserve[key]) {
        r.ffStatus = preserve[key].ffStatus;
        if (preserve[key].driver) r.driver = preserve[key].driver;
      }
    });
    if (clearFirst) {
      await db.ref(ROOT+'/inbound').remove();
      await db.ref(ROOT+'/outbound').remove();
    }
    const writeBatch = async (path, records) => {
      const ref = db.ref(ROOT+'/'+path);
      const payload = {};
      records.forEach(r => { payload[ref.push().key] = r; });
      if (Object.keys(payload).length) await ref.update(payload);
    };
    await writeBatch('inbound',  _pendingImport.inbound);
    await writeBatch('outbound', _pendingImport.outbound);
    showAlert(`Imported ${_pendingImport.inbound.length} inbound + ${_pendingImport.outbound.length} outbound loads`,'success');
    _pendingImport = null;
    closeModal();
  } catch (err) {
    showAlert('Import failed: '+err.message,'danger');
    go.disabled = false; go.textContent = 'Import';
  }
}

// ─── INIT ───────────────────────────────────────────────────────────────
db.ref(ROOT+'/authUsers').on('value', snap => {
  state.authUsers = snap.val() || {};
  ensureAdminSeed();
  if (document.getElementById('auth-users-tbody')) renderUsersTable();
});
db.ref(ROOT+'/sessions').on('value', snap => {
  state.sessions = snap.val() || {};
  if (document.getElementById('active-sessions')) renderActiveSessions();
});
db.ref(ROOT+'/settings').on('value', snap => {
  state.settings = snap.val() || {};
});
buildLoginScreen();
</script>
