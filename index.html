// ─── RENDER YARD ────────────────────────────────────────────────────────
const DOOR_TYPES = {
  15:'DO NOT USE',16:'IB LIVE LOAD',
  17:'IB LIVE LOAD',18:'IB LIVE LOAD',19:'IB LIVE LOAD',20:'IB LIVE LOAD',21:'IB LIVE LOAD',22:'IB LIVE LOAD',
  23:'FIRST FLEET',24:'FIRST FLEET',25:'DO NOT USE',26:'FIRST FLEET',27:'FIRST FLEET',28:'FIRST FLEET',
  29:'FIRST FLEET',30:'FIRST FLEET',31:'FIRST FLEET',32:'FIRST FLEET',33:'FIRST FLEET',34:'FIRST FLEET',
  35:'FIRST FLEET',36:'FIRST FLEET',37:'FIRST FLEET',38:'FIRST FLEET',
  40:'OB LIVE LOAD',41:'OB LIVE LOAD',42:'OB LIVE LOAD',43:'OB LIVE LOAD',
  44:'PWD ONLY',45:'PWD ONLY',46:'PWD ONLY',47:'PWD ONLY',48:'PWD ONLY',49:'PWD ONLY',50:'PWD ONLY',51:'PWD ONLY'
};
const TYPE_CLASS = {'DO NOT USE':'do-not-use','IB LIVE LOAD':'ib-live','OB LIVE LOAD':'ob-live','FIRST FLEET':'first-fleet','PWD ONLY':'pwd'};
const TYPE_COLOR = {'DO NOT USE':'var(--danger)','IB LIVE LOAD':'var(--inbound)','OB LIVE LOAD':'var(--outbound)','FIRST FLEET':'var(--warning)','PWD ONLY':'#7c3aed'};
const RAIL_DOORS = [1,2,3,4,5,6,7];

// Clear manual /yard/doors residue whose load has already left the building.
// Manual door entries persist independently of the schedule, so once their trailer
// or order appears on a DEPARTED/CANCELLED (OB) or COMPLETED (IB) load — and no live
// load currently holds that door — the saved record is stale. We purge it at the
// source (Firebase + local state) so every surface that reads it (door card, edit
// window, and yard-check sheet) reflects empty consistently. Manual drop-trailer
// entries that never matched a schedule load are never touched.
function pruneStaleDoors() {
  const doors = state.yard.doors;
  if (!doors) return;
  // Once Inbound/Outbound has a load for a door, the schedule owns that door and any hand-keyed
  // manual placeholder is dropped, so the door is driven by the load (a live load shows through;
  // a departed/completed load leaves the door empty). A manual entry is superseded when EITHER
  //   (a) a live (not COMPLETED/DEPARTED) load currently occupies that door, OR
  //   (b) any load — live or departed/completed — matches that door AND trailer.
  // Matching (b) on door+trailer (not trailer alone) leaves a reused trailer keyed onto a
  // different empty door alone until its own load lands.
  const liveDoors = new Set();
  const claimedDT = new Set();
  const claim = r => { if (r.door && r.trailer) claimedDT.add(String(r.door).trim()+'|'+String(r.trailer).trim().toUpperCase()); };
  Object.values(state.inbound||{}).forEach(r => { claim(r); if (r.door && r.trailer && r.status!=='COMPLETED') liveDoors.add(String(r.door).trim()); });
  Object.values(state.outbound||{}).forEach(r => { claim(r); if (r.door && r.trailer && r.status!=='DEPARTED')  liveDoors.add(String(r.door).trim()); });
  Object.keys(doors).forEach(num => {
    const d = doors[num]; if (!d || !d.trailer) return;
    const door = String(num).trim();
    if (liveDoors.has(door) || claimedDT.has(door+'|'+String(d.trailer).trim().toUpperCase())) {
      delete doors[num];                                     // schedule owns this door — drop the manual placeholder
      try { db.ref(ROOT+'/yard/doors/'+num).remove(); } catch(e){}
    }
  });
}

function renderYard() {
  pruneStaleDoors();
  const view = document.getElementById('view-yd');
  keepScroll(view);
  const doors = state.yard.doors||{};
  const rail  = state.yard.rail||{};

  // Live door occupancy auto-derived from the schedule:
  //  - A door is shown occupied whenever a load has BOTH a door and a trailer
  //    assigned (any day), until it departs (outbound) or completes (inbound).
  const liveDoors = {};
  Object.entries(state.inbound||{}).forEach(([id,r]) => {
    if (r.door && r.trailer && r.status!=='COMPLETED')
      liveDoors[String(r.door).trim()] = { id, reqDate:r.reqDate||'', src:'ib', status:r.status||'INBOUND', trailer:r.trailer||'', customer:r.customer||'', order:r.loadNum||'', carrier:r.carrier||'' };
  });
  Object.entries(state.outbound||{}).forEach(([id,r]) => {
    if (r.door && r.trailer && r.status!=='DEPARTED')
      liveDoors[String(r.door).trim()] = { id, reqDate:r.reqDate||'', src:'ob', status:r.status||'OUTBOUND', trailer:r.trailer||'', customer:r.customer||'', order:r.orderNum||'', carrier:r.carrier||'' };
  });

  // A manually-saved door record (yard/doors) is independent of the schedule and
  // only clears via "Clear Door". So when its load departs/cancels (OB) or completes
  // (IB), the saved record would linger. Treat such records as empty (self-healing).
  const doneTrailers = new Set(), doneOrders = new Set();
  Object.values(state.outbound||{}).forEach(r => {
    if (r.status==='DEPARTED' || r.status==='CANCELLED') {
      if (r.trailer)  doneTrailers.add(String(r.trailer).trim().toUpperCase());
      if (r.orderNum) doneOrders.add(String(r.orderNum).trim().toUpperCase());
    }
  });
  Object.values(state.inbound||{}).forEach(r => {
    if (r.status==='COMPLETED') {
      if (r.trailer) doneTrailers.add(String(r.trailer).trim().toUpperCase());
      if (r.loadNum) doneOrders.add(String(r.loadNum).trim().toUpperCase());
    }
  });
  function manualStale(d){
    if (!d || !d.trailer) return false;
    const t = String(d.trailer).trim().toUpperCase(), o = String(d.order||'').trim().toUpperCase();
    return doneTrailers.has(t) || (o && doneOrders.has(o));
  }

  const doorNums = Object.keys(DOOR_TYPES).map(Number).sort((a,b)=>a-b);
  const occupied = doorNums.filter(n => liveDoors[String(n)] || (doors[n] && doors[n].trailer)).length;

  const carrierFilter = state.yardCarrierFilter || null;   // null | 'FFTI' | 'PWD'
  let fftiCount = 0, pwdCount = 0;
  let doorCards = '', shownDoors = 0;
  doorNums.forEach(n => {
    const live = liveDoors[String(n)];
    const dRaw = doors[n]||{};
    const d = dRaw;   // manual entries persist; a live scheduled load overrides the display below
    const type = DOOR_TYPES[n]||'';
    const cls = TYPE_CLASS[type]||'';
    const typColor = TYPE_COLOR[type]||'var(--text2)';
    const eff = live ? { trailer:live.trailer, carrier:live.carrier, customer:live.customer, order:live.order } : d;
    const isOccupied = !!(eff.trailer || live);
    const isManual = !live && !!eff.trailer;   // keyed in via the door editor (not from the schedule)
    // Tally FFTI / PWD occupied doors (by carrier) and apply the active carrier filter
    const carrierIsFFTI = isOccupied && isFFTICarrier(eff.carrier);
    const carrierIsPWD  = isOccupied && isPWDCarrier(eff.carrier);
    if (carrierIsFFTI) fftiCount++;
    if (carrierIsPWD)  pwdCount++;
    if (carrierFilter==='FFTI' && !carrierIsFFTI) return;
    if (carrierFilter==='PWD'  && !carrierIsPWD)  return;
    shownDoors++;
    const liveCls = live ? (live.src==='ib'?'ib-live':'ob-live') : (isOccupied?'occupied':'');
    let badge = '';
    if (live) badge = `<span class="door-badge ${live.src==='ib'?'badge-unloading':'badge-loaded'}">${live.status}</span>`;
    else if (d.trailer) badge = `<span class="door-badge ${d.loaded==='LOADED'?'badge-loaded':'badge-empty'}">${d.loaded||'EMPTY'}</span>`;
    const tag = live

      : (isManual ? `<span class="door-manual-tag">MANUAL ENTRY</span>` : '');
    doorCards += `<div class="door-card ${cls} ${liveCls}" onclick="editDoor(${n})">
      <div class="door-num">${n}</div>
      <div class="door-info">
        <div class="door-type" style="color:${typColor}">${type}${tag}</div>

        ${isManual && eff.enteredAt?`<div class="door-meta" style="font-size:9px;opacity:.7">✎ ${(eff.enteredBy||'manual')} · ${fmtStamp(eff.enteredAt)}</div>`:''}
      </div>
      ${badge}
    </div>`;
  });

  let railCards = '';
  RAIL_DOORS.forEach(n => {
    const r = rail[n]||{};
    railCards += `<div class="rail-card" onclick="editRail(${n})">
      <div class="rail-num">${n}</div>
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--text)">${r.customer||'<span style="color:var(--text2)">—</span>'}</div>
        <div style="font-size:10px;color:var(--text2)">${r.boxCar||'No box car'}</div>
      </div>
    </div>`;
  });

  const cchip = (key,label,count,color)=>{
    const active = carrierFilter===key;
    return `<div class="scard yard-cfilter${active?' active':''}" onclick="toggleYardCarrier('${key}')" title="Click to ${active?'clear the':'show only'} ${label} loads"
      style="cursor:pointer${active?`;border-color:${color};box-shadow:inset 0 0 0 2px ${color}`:''}">
      <div class="scard-label" style="color:${color}">${label}${active?' ✕':''}</div>
      <div class="scard-value" style="color:${color}">${count}</div>
    </div>`;
  };
  const filterNote = carrierFilter
    ? `<span style="font-weight:600;color:${carrierFilter==='PWD'?'#0891b2':'var(--outbound)'}">· showing ${carrierFilter} only (${shownDoors})</span>`
    : '';
  const emptyMsg = (carrierFilter && shownDoors===0)
    ? `<div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--text2);font-size:13px">No ${carrierFilter} loads on the doors right now. <a style="color:var(--accent);cursor:pointer;text-decoration:underline" onclick="toggleYardCarrier('${carrierFilter}')">Clear filter</a></div>`
    : '';

  view.innerHTML = `

    <div class="scard"><div class="scard-label">Occupied</div><div class="scard-value" style="color:var(--accent2)">${occupied}</div></div>
    <div class="scard"><div class="scard-label">Available</div><div class="scard-value" style="color:var(--text2)">${doorNums.length-occupied}</div></div>
    ${cchip('FFTI','FFTI',fftiCount,'var(--outbound)')}
    ${cchip('PWD','PWD',pwdCount,'#0891b2')}

    ${carrierFilter ? '' : `<div style="margin-top:18px">
      <div class="yard-section-title">Rail Doors</div>

function shiftDate(type, delta) {

  if(type==='ib') renderInbound(); else if(type==='ob') renderOutbound(); else if(type==='pwd') renderPWD(); else renderFirstFleet();
}
let _obSearchTimer = null;

// ─── PER-COLUMN HEADER FILTERS ─────────────────────────────────────────
function _colHit(val, q){ return !q || String(val||'').toUpperCase().indexOf(String(q).trim().toUpperCase()) > -1; }
function refocusFilter(id){ const el=document.getElementById(id); if(el){ el.focus(); const L=el.value.length; try{ el.setSelectionRange(L,L); }catch(e){} } }
// Board dispatch so the same header filter / sort widgets work across ib, ob, ff, pwd
function _boardSortKey(board){ return board==='ib'?'ibSort':board==='ob'?'obSort':board==='ff'?'ffSort':'pwdSort'; }
function _boardFilter(board){ return board==='ib'?state.ibColFilter:board==='ob'?state.obColFilter:board==='ff'?state.ffColFilter:state.pwdColFilter; }
function _boardRender(board){ if(board==='ib')renderInbound(); else if(board==='ob')renderOutbound(); else if(board==='ff')renderFirstFleet(); else renderPWD(); }
function ibFiltering(){ const f=state.ibColFilter||{}; return !!((f.customer||'').trim() || (f.loadNum||'').trim()); }
function ibColMatch(r){ const f=state.ibColFilter||{}; return _colHit(r.customer,f.customer) && _colHit(r.loadNum,f.loadNum); }
function setIbFilter(field, v){ state.ibColFilter[field]=v; renderInbound(); refocusFilter('ib-filter-'+field); }
function obFiltering(){ const f=state.obColFilter||{}; return !!((f.customer||'').trim() || (f.orderNum||'').trim() || (f.picker||'').trim() || (f.loader||'').trim() || (f.trailer||'').trim()); }
function obColMatch(r){ const f=state.obColFilter||{}; return _colHit(r.customer,f.customer) && _colHit(r.orderNum,f.orderNum) && _colHit(r.picker,f.picker) && _colHit(r.loader,f.loader) && _colHit(r.trailer,f.trailer); }
function setObFilter(field, v){ state.obColFilter[field]=v; renderOutbound(); refocusFilter('ob-filter-'+field); }
// FF / PWD share the same columns (status, carrier, customer, orig req date, load id, door, trailer, driver, notes)
function _ffLikeMatch(f, r){ return _colHit(r.status,f.status) && _colHit(r.carrier,f.carrier) && _colHit(r.customer,f.customer) && _colHit((r.origReqDate||r.reqDate||'').slice(0,10),f.origReqDate) && _colHit(r.loadId,f.loadId) && _colHit(r.door,f.door) && _colHit(r.trailer,f.trailer) && _colHit(r.driver,f.driver) && _colHit(r.phone,f.phone) && _colHit(r.notes,f.notes); }
function ffFiltering(){ const f=state.ffColFilter||{}; return Object.keys(f).some(k=>(f[k]||'').trim()); }
function ffColMatch(r){ return _ffLikeMatch(state.ffColFilter||{}, r); }
function setFfFilter(field, v){ state.ffColFilter[field]=v; renderFirstFleet(); refocusFilter('ff-filter-'+field); }
function ffSorting(){ return !!(state.ffSort && state.ffSort.field); }
function pwdFiltering(){ const f=state.pwdColFilter||{}; return Object.keys(f).some(k=>(f[k]||'').trim()); }
function pwdColMatch(r){ return _ffLikeMatch(state.pwdColFilter||{}, r); }
function setPwdFilter(field, v){ state.pwdColFilter[field]=v; renderPWD(); refocusFilter('pwd-filter-'+field); }
function pwdSorting(){ return !!(state.pwdSort && state.pwdSort.field); }
// Header cell with a built-in free-type filter input under the label
function thFilter(label, board, field, width){
  const val = (_boardFilter(board)[field]||'').replace(/"/g,'&quot;');
  const setter = board==='ib'?'setIbFilter':board==='ob'?'setObFilter':board==='ff'?'setFfFilter':'setPwdFilter';
  const w = width?` style="vertical-align:top;width:${width}"`:' style="vertical-align:top"';
  return `<th${w}><div class="th-sort" onclick="sortBoard('${board}','${field}')" title="Click to sort by ${label}">${label}${sortArrow(board,field)}</div><input id="${board}-filter-${field}" class="col-filter" type="text" size="4" value="${val}" placeholder="filter" onclick="event.stopPropagation()" oninput="${setter}('${field}',this.value)"></th>`;
}
// ─── COLUMN SORT (click a header to sort the board) ─────────────────────
function ibSorting(){ return !!(state.ibSort && state.ibSort.field); }
function obSorting(){ return !!(state.obSort && state.obSort.field); }
function sortArrow(board, field){
  const s = state[_boardSortKey(board)];
  if (!s || s.field !== field) return '';
  return ' <span class="sort-arrow">' + (s.dir===1 ? '\u25B2' : '\u25BC') + '</span>';
}
function thS(label, board, field, attrs){
  return '<th class="th-sort" '+(attrs||'')+' onclick="sortBoard(\''+board+'\',\''+field+'\')" title="Click to sort by '+label+'">'+label+sortArrow(board,field)+'</th>';
}
function _sortVal(r, field){
  if (field==='priority') return r.priority ? 0 : 1;
  if (field==='door') { const n = parseInt(r.door,10); return isNaN(n) ? 1e9 : n; }
  if (field==='apptTime') {
    if (isDropHook(r)) return 'ZZZ2';
    const t = (r.apptTime||'').slice(0,5);
    return t ? ('A'+t) : 'ZZZ1';
  }
  if (field==='reqDate') return String(r.reqDate||'');
  if (field==='origReqDate') return String(r.origReqDate||r.reqDate||'').slice(0,10);
  return String(r[field]||'').toUpperCase();
}
function sortRecs(recs, s){
  if (!s || !s.field) return recs;
  return recs.slice().sort((a,b)=>{
    const va=_sortVal(a[1],s.field), vb=_sortVal(b[1],s.field);
    if (va<vb) return -s.dir; if (va>vb) return s.dir; return 0;
  });
}
function sortBoard(board, field){
  const key = _boardSortKey(board);
  const s = state[key] || {field:'',dir:1};
  if (s.field===field) { if (s.dir===1) { s.dir=-1; } else { s.field=''; s.dir=1; } }  // asc -> desc -> off
  else { s.field=field; s.dir=1; }
  state[key]=s;
  _boardRender(board);
}

function setDate(type, val) {
  if(!val) return;
  const key = type==='ib'?'ibDate':type==='ob'?'obDate':type==='pwd'?'pwdDate':'ffDate';
  state[key] = val;
  if(type==='ib') renderInbound(); else if(type==='ob') renderOutbound(); else if(type==='pwd') renderPWD(); else renderFirstFleet();
}

// Find another load (any date) already using this Order #/Load #.
function findOrderConflict(isIB, orderVal, excludeId) {
  if (!orderVal) return null;
  const coll = isIB ? state.inbound : state.outbound;
  const key  = isIB ? 'loadNum' : 'orderNum';
  const target = String(orderVal).trim().toUpperCase();
  for (const [xid, r] of Object.entries(coll||{})) {
    if (xid === excludeId || !r) continue;
    if ((r.status||'').toUpperCase()==='CANCELLED') continue;   // cancelled loads don't count as duplicates
    if (String(r[key]||'').trim().toUpperCase() === target) return [xid, r];
  }
  return null;
}
// Numbers (loadNum / orderNum) that appear on 2+ active loads → used to tag duplicates on the board.
function dupNumMap(coll, field){
  const by = {};
  Object.entries(coll||{}).forEach(([k,r])=>{
    if(!r || (r.status||'').toUpperCase()==='CANCELLED') return;
    const n = String(r[field]||'').trim().toUpperCase();
    if(!n) return;
    (by[n]=by[n]||[]).push(k);
  });
  const dups = {};
  Object.keys(by).forEach(n=>{ if(by[n].length>1) dups[n]=by[n]; });
  return dups;
}
// Duplicate badge for a row (links to the other occurrence of the same number).
function dupBadge(board, dups, num, selfKey){
  const others = (dups[String(num||'').trim().toUpperCase()]||[]).filter(k=>k!==selfKey);
  if(!others.length) return '';
  return `<span class="dup-badge" onclick="event.stopPropagation();yardNavToLoad('${board}','${others[0]}')" title="Duplicate ${board==='ib'?'Load':'Order'} # — click to view the other load">⚠ DUPLICATE</span>`;
}
// Live warning as an order/load # is typed in the Add modal.
function checkDupWarn(type){
  const isIB = type==='ib';
  const el = document.getElementById(isIB?'f-loadnum':'f-ordernum');
  const warn = document.getElementById('dup-warn');
  if(!el || !warn) return;
  const num = (el.value||'').trim();
  const hit = num ? findOrderConflict(isIB, num, null) : null;
  if(hit){
    const [k,r] = hit;
    const d = (r.reqDate||'').slice(0,10);
    const st = (r.status||'').toUpperCase();
    const done = isIB ? (st==='COMPLETED') : (st==='DEPARTED');   // completed/departed → no Roll it
    const _lnk = 'color:#fff;font-weight:800;text-decoration:underline';
    const viewLink = '<a href="#" onclick="closeModal();yardNavToLoad(\''+type+'\',\''+k+'\');return false;" style="'+_lnk+'">View it</a>';
    const rollLink = done ? '' : ' &nbsp;·&nbsp; <a href="#" onclick="rollExistingFromDup(\''+type+'\',\''+k+'\');return false;" style="'+_lnk+'">Roll it</a>';
    warn.style.display = 'block';
    warn.innerHTML = '⚠ '+(isIB?'Load #':'Order #')+num.toUpperCase()+' already exists'+(d?(' on '+fmtDateLabel(d)):'')+
      (r.customer?(' — '+r.customer):'')+'. '+viewLink+rollLink;
  } else {
    warn.style.display = 'none'; warn.innerHTML = '';
  }
}

// From the "already exists" banner while creating an order: roll the existing (non-completed)
// load to the Req Date currently on the form, then jump to it. Completed/Departed loads get no
// Roll it link; this status check is a belt-and-suspenders guard.
function rollExistingFromDup(type, id){
  const isIB = type==='ib';
  const coll = isIB ? state.inbound : state.outbound;
  const r = coll && coll[id];
  if(!r){ showAlert('That load is no longer on the schedule.','warning'); return; }
  const st = (r.status||'').toUpperCase();
  if(isIB ? st==='COMPLETED' : st==='DEPARTED'){ showAlert('That load is already '+(isIB?'completed':'departed')+" — it can't be rolled.",'warning'); return; }
  const to = ((document.getElementById('f-reqdate')||{}).value||'').slice(0,10);
  if(!to){ showAlert('Set a Req Date on the form first, then Roll it.','warning'); return; }
  const from  = (r.reqDate||'').slice(0,10);
  const label = (isIB?'Load #':'Order #')+String(r[isIB?'loadNum':'orderNum']||'').toUpperCase();
  if(from===to){ showAlert(label+' is already scheduled on '+fmtDateLabel(to)+'.','warning'); return; }
  if(!confirm('Roll '+label+' from '+(from?fmtDateLabel(from):'its date')+' to '+fmtDateLabel(to)+'?')) return;
  r.reqDate = to; r.apptTime = ''; r.updatedAt = Date.now();   // optimistic; origReqDate untouched so it shows as ROLLED
  db.ref(ROOT+(isIB?'/inbound/':'/outbound/')+id).update({ reqDate:to, apptTime:'', updatedAt:Date.now() })
    .then(()=>showAlert(label+' rolled to '+fmtDateLabel(to)+'.','success'))
    .catch(()=>showAlert('Roll failed — check your connection and try again.','warning'));
  closeModal();
  yardNavToLoad(type, id);
}

function saveLoad(type, id) {
  const isIB = type==='ib';
  const g = id => document.getElementById(id);
  const UP = id => ((g(id)||{}).value||'').toUpperCase();
  const reqDate = (g('f-reqdate')||{}).value||'';
  const rawAppt = (g('f-appttime')||{}).value||'';
  const orderVal = isIB ? UP('f-loadnum') : UP('f-ordernum');
  const orderLabel = isIB ? 'Load #' : 'Order #';

  // (#1) MULTIPLE LOADS for one customer — one load per entered ID (up to 10), all sharing the
  // customer / req date / carrier / destination / appt time. Door and trailer are left blank.
  if (!id && g('f-multi') && g('f-multi').checked) {
    const ids = [];
    for (let i=1;i<=10;i++){ const v=UP('f-multi-'+i); if(v) ids.push(v); }
    const uniq = [...new Set(ids)];
    const miss=[];
    if(!UP('f-customer')) miss.push('Customer');
    if(!reqDate) miss.push('Req Date');
    if(!isIB && !UP('f-destination')) miss.push('Destination');
    if(!UP('f-carrier')) miss.push('Carrier');
    if(!uniq.length) miss.push(isIB?'at least one Load #':'at least one Order #');
    if(miss.length){ showAlert('Please complete: '+miss.join(', ')+' before creating multiple loads.','warning'); return; }
    const carrier = UP('f-carrier');
    let mAppt = (g('f-multi-appt')||{}).value || '';
    if (mAppt===NOAPPT_VAL) mAppt = '';
    if (!isIB && mAppt==='' && carrier==='FFTI') mAppt = DROPHOOK_VAL;   // FFTI w/ no appt -> drop & hook
    const coll = isIB ? (state.inbound||(state.inbound={})) : (state.outbound||(state.outbound={}));
    const base = { customer:UP('f-customer'), reqDate, apptTime:mAppt, door:'', trailer:'', carrier, phone:UP('f-phone'), notes:UP('f-notes'),
                   createdAt:Date.now(), updatedAt:Date.now(), origReqDate:reqDate, source:'manual', status:isIB?'SCHEDULED':'ORDER RECEIVED' };
    if(!isIB) base.destination = UP('f-destination');
    const created=[], skipped=[];
    uniq.forEach(oid=>{
      const dup = Object.values(coll).some(r=>((isIB?r.loadNum:r.orderNum)||'').toUpperCase()===oid && (r.reqDate||'').slice(0,10)===reqDate);
      if(dup){ skipped.push(oid); return; }
      const key = db.ref().push().key;
      const rec = Object.assign({}, base, isIB?{loadNum:oid}:{orderNum:oid});
      coll[key] = rec;                                             // (#2) optimistic — visible immediately
      db.ref(ROOT+(isIB?'/inbound/':'/outbound/')+key).update(rec).catch(()=>{});
      created.push(oid);
    });
    state[isIB?'ibDate':'obDate'] = reqDate;
    if(isIB) renderInbound(); else renderOutbound();
    updateBadges();
    let msg = 'Created '+created.length+' load'+(created.length===1?'':'s')+' for '+base.customer+' on '+reqDate+'.';
    if(skipped.length) msg += ' Skipped '+skipped.length+' already scheduled ('+skipped.join(', ')+').';
    showAlert(msg, created.length?'success':'warning');
    closeModal();
    return;
  }

  // (#3) New entries must have the key fields filled before they can be saved.
  if (!id) {
    const missing = [];
    if (!UP('f-customer'))            missing.push('Customer');
    if (!orderVal)                    missing.push(orderLabel);
    if (!reqDate)                     missing.push('Req Date');
    if (!rawAppt)                     missing.push('Appt Time');
    if (!isIB && !UP('f-destination')) missing.push('Destination');
    if (!UP('f-carrier'))             missing.push('Carrier');
    if (missing.length) { showAlert('Please complete the following before saving: '+missing.join(', ')+'.','warning'); return; }
  }

  let apptTime = rawAppt;
  if (apptTime===NOAPPT_VAL) {
    apptTime = '';
  } else if (apptTime===DROPHOOK_VAL) {
    /* drop & hook — not a timed slot, no double-book check */
  } else if (apptTime) {
    const coll = isIB ? state.inbound : state.outbound;
    const { taken } = apptSlotsTaken(coll, reqDate, id||undefined);
    if (taken.has(apptTime.slice(0,5))) { showAlert('That appointment time is already booked for '+reqDate+'. Pick another.','warning'); return; }
  }
  // Outbound FFTI loads with no appointment go under Drop & Hook, not No Appointment.
  if (!isIB && apptTime==='' && UP('f-carrier')==='FFTI') apptTime = DROPHOOK_VAL;

  // (#1) Duplicate order # on a new entry -> offer to roll the existing one to the new date.
  if (!id) {
    const conflict = findOrderConflict(isIB, orderVal, id);
    const _cst = conflict ? (conflict[1].status||'').toUpperCase() : '';
    const _cTerminal = conflict && (isIB ? _cst==='COMPLETED' : _cst==='DEPARTED');   // don't roll a done load
    if (conflict && !_cTerminal) {
      const [cid, crec] = conflict;
      const cdate = (crec.reqDate||'').slice(0,10);
      if (cdate === reqDate) { showAlert(orderLabel+orderVal+' is already scheduled on '+cdate+'.','warning'); return; }
      if (!confirm(orderLabel+orderVal+' already exists on '+cdate+'. Do you want to roll it to '+reqDate+'?')) return;
      state[isIB?'ibDate':'obDate'] = reqDate;                   // (#2) jump to the date immediately
      const crll = isIB ? state.inbound : state.outbound;        // optimistic local update so it moves right away
      if (crll[cid]) { crll[cid].reqDate = reqDate; crll[cid].apptTime = apptTime; crll[cid].updatedAt = Date.now(); }
      if (isIB) renderInbound(); else renderOutbound();
      closeModal();
      db.ref(ROOT+(isIB?'/inbound/':'/outbound/')+cid).update({ reqDate:reqDate, apptTime:apptTime, updatedAt:Date.now() })
        .then(()=>{ showAlert(orderLabel+orderVal+' rolled to '+reqDate+'.','success'); })
        .catch(()=>showAlert('Roll failed — check your connection.','warning'));
      return;
    }
  }

  const data = {
    customer:    UP('f-customer'),
    reqDate:     reqDate,
    apptTime:    apptTime,
    door:        UP('f-door'),
    trailer:     UP('f-trailer'),
    carrier:     UP('f-carrier'),
    phone:       UP('f-phone'),
    notes:       UP('f-notes'),
    updatedAt:   Date.now(),
  };
  if(isIB) {
    data.loadNum  = UP('f-loadnum');
    if(g('f-timein'))  data.timeIn  = g('f-timein').value||'';
    if(g('f-timeout')) data.timeOut = g('f-timeout').value||'';
    data.status = (id?state.inbound[id]?.status:null)||'SCHEDULED';
  } else {
    data.orderNum     = UP('f-ordernum');
    data.destination  = UP('f-destination');
    if(g('f-timein'))  data.timeIn  = g('f-timein').value||'';
    if(g('f-timeout')) data.timeOut = g('f-timeout').value||'';
    data.status = (id?state.outbound[id]?.status:null)||'ORDER RECEIVED';
  }
  const key = id || db.ref().push().key;
  const path = ROOT+(isIB?'/inbound/':'/outbound/')+key;
  if(!id) { data.createdAt = Date.now(); data.origReqDate = data.reqDate; data.source = 'manual'; }
  else {
    // Keep the original requested date in step with the board date on a non-rolled load, so
    // editing the date in the modal doesn't spuriously flag it ROLLED and the line stays in sync.
    const _existing = (isIB ? state.inbound : state.outbound)[id] || {};
    if (!isRolled(_existing)) data.origReqDate = data.reqDate;
  }
  state[isIB?'ibDate':'obDate'] = data.reqDate;   // (#2) jump to the entered date immediately
  // (#2) optimistic local update so the load is visible right away — don't wait on the round-trip
  const scoll = isIB ? (state.inbound||(state.inbound={})) : (state.outbound||(state.outbound={}));
  scoll[key] = Object.assign({}, scoll[key]||{}, data);
  if (isIB) renderInbound(); else renderOutbound();
  updateBadges();
  closeModal();
  db.ref(path).update(data)
    .then(()=>{ showAlert('Saved!','success'); })
    .catch(()=>showAlert('Save failed — check your connection and try again.','warning'));
}

  const r = coll && coll[id];

// Editing the requested date on a row is a full date change: the order moves to that day
// (board + modal follow), and its original requested date moves with it — unless the load
// has already been rolled to a later day, in which case only the original date is adjusted
// so the roll is preserved.
function saveRowDate(type, id, value){
  const coll = type==='ib' ? state.inbound : state.outbound;
  const rec  = coll && coll[id];
  const upd  = { origReqDate: value, updatedAt: Date.now() };
  if (!(rec && isRolled(rec))) { upd.reqDate = value; state[type==='ib'?'ibDate':'obDate'] = value; }
  if (rec) Object.assign(rec, upd);
  db.ref(ROOT+'/'+(type==='ib'?'inbound':'outbound')+'/'+id).update(upd)
    .catch(e=>console.warn('Row date save error', e));
  if (type==='ib') renderInbound(); else renderOutbound();
}
// Warn if a door or trailer entered in Outbound collides with another active load
// (a door can hold one trailer; a trailer can't be in two places).
function checkDupAssignment(field, id, value) {
  const v = (value||'').toString().trim();
  if (!v) return;
  const vU = v.toUpperCase();
  let hit = null;
  const scan = (recs, src) => {
    if (hit) return;
    for (const k in (recs||{})) {
      if (k === id) continue;
      const r = recs[k]; if (!r) continue;
      if (src==='ob' && r.status==='DEPARTED') continue;
      if (src==='ib' && r.status==='COMPLETED') continue;
      const rv = (r[field]||'').toString().trim().toUpperCase();
      if (rv && rv === vU) { hit = { customer:r.customer||'', order:r.orderNum||r.loadNum||'', side:src }; return; }
    }
  };
  scan(state.outbound, 'ob');
  scan(state.inbound, 'ib');
  if (hit) {
    const who = (hit.customer || 'another load') + (hit.order ? ` (${hit.order})` : '') + (hit.side==='ib' ? ' — INBOUND' : '');
    showAlert(`⚠ Duplicate ${field==='door'?'door':'trailer'} ${v} — already assigned to ${who}`, 'danger');
  }
}

function closeModal() { document.getElementById('modal-container').innerHTML=''; }
function showAlert(msg, type='success') {
  const el = document.createElement('div');
  el.className='alert-toast alert-'+type;
  el.textContent=msg;
  document.getElementById('alert-container').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300);},2500);
}

// ─── EXCEL IMPORT (one-time SharePoint workbook → app seed) ──────────────
// Mirrors the live 6021 Greensboro dock-schedule workbook layout:
//   - 2026_6021_INBOUND  : inbound side, columns B..O
//   - 2026_6021_OUTBOUND : outbound side, columns P..AF
// Both sides are calendar grids: each day is a block whose date sits in the
// first column of the block; load rows below it are real only when a
// customer / load# / order# is present.

const IB_COL = { status:1, customer:2, loadNum:3, reqDateCol:4, apptTime:5, timeIn:6, timeOut:7, door:10, trailer:11, carrier:12, notes:13 }; // INBOUND sheet 0-based (B=1 … N=13); LOCATION no longer on sheet
const OB_COL = { status:15, customer:16, orderNum:17, reqDateCol:19, destination:18, apptTime:20, timeIn:21, timeOut:22, picker:25, stageLoc:26, loader:27, door:28, trailer:29, carrier:30, notes:31 }; // P=15 ... AF=31

function xlsxVal(v) {
  // Returns {kind:'date', s:'YYYY-MM-DD'} | {kind:'time', s:'HH:MM'} | {kind:'text', s:'...'} | null
  if (v === null || v === undefined || v === '') return null;
  if (v instanceof Date) {
    if (v.getFullYear() < 1901) {              // Excel time-only serial → epoch 1899-12-30
      const hh = String(v.getHours()).padStart(2,'0');
      const mm = String(v.getMinutes()).padStart(2,'0');
      return { kind:'time', s: hh+':'+mm };
    }
    const y=v.getFullYear(), m=String(v.getMonth()+1).padStart(2,'0'), d=String(v.getDate()).padStart(2,'0');
    return { kind:'date', s:`${y}-${m}-${d}` };
  }
  if (typeof v === 'number') {                  // fallback: bare time fraction of a day
    if (v > 0 && v < 1) {
      const mins = Math.round(v*24*60);
      const hh = String(Math.floor(mins/60)).padStart(2,'0');
      const mm = String(mins%60).padStart(2,'0');
      return { kind:'time', s: hh+':'+mm };
    }
    return { kind:'text', s:String(v).trim() };
  }
  return { kind:'text', s:String(v).trim() };
}
function asTime(v){ const o=xlsxVal(v); if(!o) return ''; return o.kind==='time' && o.s!=='00:00' ? o.s : ''; }
function asText(v){ const o=xlsxVal(v); return o ? o.s : ''; }

const IB_STATUS_MAP = { 'COMPLETED':'COMPLETED','UNLOADING':'UNLOADING','ARRIVED':'ARRIVED','SCHEDULED':'SCHEDULED' };
const OB_STATUS_MAP = {
  'ORDER RECEIVED':'ORDER RECEIVED','PICK TICKET':'PICK TICKET','PICK TICKET CREATED':'PICK TICKET',
  'BEING PICKED':'BEING PICKED','PICKED & STAGED':'PICKED & STAGED','LOADING':'LOADING',
  'LOADED':'LOADED','CANCELLED':'CANCELLED','DEPARTED':'DEPARTED','COMPLETED':'DEPARTED'
};

function parseSide(rows, COL, realKeys, statusMap, defaultStatus, sideFields) {
  const out = [];
  let curDate = null;
  for (const row of rows) {
    if (!row) continue;
    const dcell = xlsxVal(row[COL.status]);          // block date / marker / status live in first col of side
    if (dcell && dcell.kind === 'date') { curDate = dcell.s; continue; }
    if (dcell && dcell.kind === 'text' && /LOADS/i.test(dcell.s)) continue; // summary marker row
    if (!curDate) continue;
    // real load if any identifying field present
    const hasReal = realKeys.some(k => { const t = asText(row[COL[k]]); return t && t !== '' ; });
    if (!hasReal) continue;
    // skip repeated in-grid header rows
    const cust = asText(row[COL.customer]);
    if (cust === 'CUSTOMER' || asText(row[COL.status]) === 'STATUS') continue;

    const rec = { reqDate: curDate, createdAt: Date.now(), updatedAt: Date.now(), source:'excel-import' };
    // Original requested date = the per-row REQ DATE column when present and sane.
    // A REQ DATE a few days off the block date is a real roll; one that's ~a year+ off
    // (e.g. 2025/2205/2000 year-typos) is ignored and we keep the block date instead.
    let origDate = curDate;
    if (COL.reqDateCol != null) {
      const rd = xlsxVal(row[COL.reqDateCol]);
      if (rd && rd.kind === 'date') {
        const days = Math.abs((new Date(rd.s) - new Date(curDate)) / 86400000);
        if (days <= 120) origDate = rd.s;
      }
    }
    rec.origReqDate = origDate;
    for (const f of sideFields) {
      if (f === 'apptTime' || f === 'timeIn' || f === 'timeOut') rec[f] = asTime(row[COL[f]]);
      else rec[f] = asText(row[COL[f]]);
    }
    if (rec.apptTime === 'NO APPT' || rec.apptTime === 'DNH' || rec.apptTime === 'TOTAL') rec.apptTime = '';
    const rawStatus = asText(row[COL.status]).toUpperCase();
    rec.status = statusMap[rawStatus] || defaultStatus;
    out.push(rec);
  }
  return out;
}

// Detect inbound columns by header name on the INBOUND sheet, so a future
// column insert/delete/reorder won't shift the mapping. Falls back to IB_COL.
// Only the inbound block is read (stops at the second STATUS, which is the
// outbound block that shares the same wide sheet).
function detectIBCols(rows) {
  const norm = s => String(s==null?'':s).toUpperCase().replace(/[^A-Z0-9]+/g,' ').trim();
  const HMAP = {
    'STATUS':'status','CUSTOMER':'customer','LOCATION':'location',
    'LOAD':'loadNum','LOAD NO':'loadNum','LOAD NUM':'loadNum','LOAD NUMBER':'loadNum',
    'REQ DATE':'reqDateCol','REQUESTED DATE':'reqDateCol',
    'APPT TIME':'apptTime','APPT':'apptTime','APPOINTMENT':'apptTime','APPOINTMENT TIME':'apptTime',
    'TIME IN':'timeIn','TIME OUT':'timeOut',
    'DOOR':'door','DOOR NO':'door',
    'TRAILER':'trailer','CARRIER':'carrier','NOTES':'notes','NOTE':'notes'
  };
  for (let i=0; i<Math.min(rows.length,80); i++) {
    const row = rows[i]||[];
    const N = row.map(norm);
    if (N.indexOf('STATUS')===-1 || N.indexOf('CUSTOMER')===-1) continue;
    const COL = {};
    for (let c=0; c<row.length; c++) {
      const n = N[c];
      if (n==='STATUS' && COL.status!=null) break;     // hit outbound block — stop
      const key = HMAP[n];
      if (key && COL[key]==null) COL[key] = c;          // first occurrence = inbound block
    }
    if (COL.status!=null && COL.customer!=null && COL.loadNum!=null) return COL;
  }
  return null;
}
// Detect OUTBOUND columns by header name. The outbound sheet also has an inbound
// block on the left (B–N), so we locate the outbound block by its ORDER # header
// (outbound-only) and read from that block's STATUS rightward.
function detectOBCols(rows) {
  const norm = s => String(s==null?'':s).toUpperCase().replace(/[^A-Z0-9]+/g,' ').trim();
  const HMAP = {
    'STATUS':'status','CUSTOMER':'customer','ORDER':'orderNum','ORDER NO':'orderNum','ORDER NUM':'orderNum',
    'DESTINATION':'destination','DEST':'destination','REQ DATE':'reqDateCol','REQUESTED DATE':'reqDateCol',
    'APPT TIME':'apptTime','APPT':'apptTime','APPOINTMENT':'apptTime','APPOINTMENT TIME':'apptTime',
    'TIME IN':'timeIn','TIME OUT':'timeOut',
    'PICKER':'picker','STAGE LOC':'stageLoc','STAGE LOCATION':'stageLoc','STAGE':'stageLoc','STAGING':'stageLoc',
    'LOADER':'loader','DOOR':'door','DOOR NO':'door','TRAILER':'trailer','CARRIER':'carrier','NOTES':'notes','NOTE':'notes'
  };
  for (let i=0; i<Math.min(rows.length,80); i++) {
    const row = rows[i]||[];
    const N = row.map(norm);
    const orderIdx = N.indexOf('ORDER');
    if (orderIdx===-1) continue;
    let start = -1;                                   // the outbound block's STATUS (at/left of ORDER)
    for (let c=orderIdx; c>=0; c--) { if (N[c]==='STATUS') { start=c; break; } }
    if (start===-1) continue;
    const COL = {};
    for (let c=start; c<row.length; c++) {
      const key = HMAP[N[c]];
      if (key && COL[key]==null) COL[key] = c;        // first occurrence within the outbound block
    }
    if (COL.status!=null && COL.customer!=null && COL.orderNum!=null) return COL;
  }
  return null;
}
function extractWorkbook(wb) {
  const ibSheet = wb.Sheets['2026_6021_INBOUND'];
  const obSheet = wb.Sheets['2026_6021_OUTBOUND'];
  if (!ibSheet || !obSheet)
    throw new Error('Could not find sheets "2026_6021_INBOUND" / "2026_6021_OUTBOUND". Make sure you selected the 6021 Greensboro workbook.');
  const fullRange = ws => { const r = XLSX.utils.decode_range(ws['!ref']); r.s.r = 0; r.s.c = 0; return XLSX.utils.encode_range(r); };
  const opt = ws => ({ header:1, raw:true, defval:null, blankrows:true, range: fullRange(ws) });
  const ibRows = XLSX.utils.sheet_to_json(ibSheet, opt(ibSheet));
  const obRows = XLSX.utils.sheet_to_json(obSheet, opt(obSheet));

  const ibCOL = detectIBCols(ibRows) || IB_COL;                          // header-driven, IB_COL fallback
  const ibFields = ['customer','loadNum','apptTime','timeIn','timeOut','door','trailer','carrier','notes'];
  if (ibCOL.location != null) ibFields.splice(1, 0, 'location');
  const inbound  = parseSide(ibRows, ibCOL, ['customer','loadNum'],  IB_STATUS_MAP, 'SCHEDULED', ibFields);

  const obCOL = detectOBCols(obRows) || OB_COL;                          // header-driven, OB_COL fallback
  const obFields = ['customer','orderNum','destination','apptTime','timeIn','timeOut','picker','stageLoc','loader','door','trailer','carrier','notes'];
  const outbound = parseSide(obRows, obCOL, ['customer','orderNum'], OB_STATUS_MAP, 'ORDER RECEIVED', obFields);
  return { inbound, outbound };
}

let _pendingImport = null;

let _pendingTable = null;
function tableHeaderKey(h) {
  const u = String(h||'').toUpperCase().trim();
  if (u.indexOf('OPERATOR')>-1) return 'operators';
  if (u.indexOf('CUSTOMER')>-1 && u.indexOf('IN')>-1) return 'customerIB';
  if (u.indexOf('CUSTOMER')>-1 && u.indexOf('OUT')>-1) return 'customerOB';
  if (u.indexOf('STAG')>-1) return 'stageLane';
  if (u.indexOf('DOOR')>-1) return 'door';
  if (u.indexOf('OUTBOUND')>-1 && u.indexOf('STA')>-1) return 'outStatus';
  if (u.indexOf('INBOUND')>-1 && u.indexOf('STA')>-1) return 'inStatus';
  return null;
}
function extractTable(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, raw:true, defval:null, blankrows:false });
  if (!rows.length) return {};
  // FFTI customer table: columns CUSTOMER OUTBOUND + FFTI (YES/NO) -> the visible-customer list
  const hdrs = (rows[0]||[]).map(h=>String(h==null?'':h).trim().toUpperCase());
  const fftiCol = hdrs.findIndex(h=>h==='FFTI');
  const custCol = hdrs.findIndex(h=>h.indexOf('CUSTOMER')>-1);
  if (fftiCol>-1 && custCol>-1) {
    const yes=[];
    for (let r=1;r<rows.length;r++){
      const cust=String(rows[r][custCol]==null?'':rows[r][custCol]).trim().toUpperCase();
      const flag=String(rows[r][fftiCol]==null?'':rows[r][fftiCol]).trim().toUpperCase();
      if (cust && (flag==='YES'||flag==='Y'||flag==='TRUE'||flag==='1') && yes.indexOf(cust)===-1) yes.push(cust);
    }
    return { __ffti: yes };
  }
  // Icon headers table: CUSTOMER INBOUND + ICON … CUSTOMER OUTBOUND + ICON.
  // Require an actual ICON column next to each customer column, otherwise a
  // combined reference table (CUSTOMER INBOUND | CUSTOMER OUTBOUND | DOOR | …)
  // would be misread, grabbing the DOOR column as the outbound "icons".
  const ciIB = hdrs.indexOf('CUSTOMER INBOUND');
  const ciOB = hdrs.indexOf('CUSTOMER OUTBOUND');
  if (ciIB>-1 && ciOB>-1 && /ICON/.test(hdrs[ciIB+1]||'') && /ICON/.test(hdrs[ciOB+1]||'')) {
    const inbound={}, outbound={};
    const clean = v => String(v==null?'':v).trim();
    for (let r=1;r<rows.length;r++){
      const ci = clean(rows[r][ciIB]);
      if (ci) inbound[ci.toUpperCase()] = (clean(rows[r][ciIB+1])||ci).toUpperCase();
      const co = clean(rows[r][ciOB]);
      if (co) outbound[co.toUpperCase()] = (clean(rows[r][ciOB+1])||co).toUpperCase();
    }
    return { __iconHeaders: { inbound, outbound } };
  }
  const headers = rows[0];
  const out = {};
  headers.forEach((h, ci) => {
    const key = tableHeaderKey(h);
    if (!key) return;
    const vals = [];
    for (let r=1; r<rows.length; r++) {
      let v = rows[r][ci];
      if (v===null || v===undefined || String(v).trim()==='') continue;
      v = String(v).trim().toUpperCase();
      if (vals.indexOf(v)===-1) vals.push(v);
    }
    if (vals.length) out[key] = vals;
  });
  return out;
}

// Shared commit: preserve in-app outbound data (driver / ASSIGNED|DRIVER IN ROUTE
// override / priority) by order #, optionally wipe first, then write both sides.
// Clearing first is what prevents duplicate records on a re-import.
async function commitImport(data, clearFirst) {
  const preserve = {};
  Object.values(state.outbound||{}).forEach(r => {
    if (!r) return;
    const key = (r.orderNum||'').toString().trim().toUpperCase();
    if (!key) return;
    const keepStatus = (r.ffStatus === 'ASSIGNED' || r.ffStatus === 'DRIVER IN ROUTE');
    const driver = (r.driver||'').toString().trim();
    const priority = !!r.priority;
    if (keepStatus || driver || priority) preserve[key] = { ffStatus: keepStatus ? r.ffStatus : null, driver, priority };
  });
  (data.outbound||[]).forEach(r => {
    const key = (r.orderNum||'').toString().trim().toUpperCase();
    const p = key && preserve[key];
    if (p) {
      if (p.ffStatus && r.status !== 'DEPARTED' && r.status !== 'CANCELLED') r.ffStatus = p.ffStatus;
      if (p.driver)   r.driver   = p.driver;
      if (p.priority) r.priority = true;
    }
  });
  const writeBatch = async (path, records) => {
    const ref = db.ref(ROOT+'/'+path);
    const payload = {};
    records.forEach(r => { payload[ref.push().key] = r; });
    if (Object.keys(payload).length) await ref.update(payload);
  };

  if (clearFirst) {
    // Explicit clean seed (admin ticks "Clear existing first"): clear Excel-sourced loads
    // — leave app-added (manual) and PickFlow loads in place — then reseed from the sheet.
    const wipeImported = async (path) => {
      const cur = (path==='inbound' ? state.inbound : state.outbound) || {};
      const updates = {};
      Object.entries(cur).forEach(([k,r]) => { if (r && r.source === 'excel-import') updates[k] = null; });
      if (Object.keys(updates).length) await db.ref(ROOT+'/'+path).update(updates);
    };
    await wipeImported('inbound');
    await wipeImported('outbound');
    await writeBatch('inbound',  data.inbound);
    await writeBatch('outbound', data.outbound);
    return;
  }

  // Default + Refresh: MERGE the sheet into what's already on the board without clobbering
  // anything. Match by order/load number; for a matched load, fill ONLY empty fields, so
  // manual edits (doors, phone, dates, carrier, load details) always win. Orders not yet on
  // the board are added; matching orders whose data already agrees change nothing.
  const isEmpty = v => v===undefined || v===null || (typeof v==='string' && v.trim()==='');
  const mergeBatch = async (path, records, numField) => {
    const coll = (path==='inbound' ? state.inbound : state.outbound) || {};
    const ref  = db.ref(ROOT+'/'+path);
    const idx  = {};
    Object.entries(coll).forEach(([k,r]) => {
      if (!r) return;
      const nk = (r[numField]||'').toString().trim().toUpperCase();
      if (nk && !idx[nk]) idx[nk] = k;           // match by order/load number (first wins)
    });
    const fills = {}, adds = {};
    records.forEach(r => {
      const nk = (r[numField]||'').toString().trim().toUpperCase();
      const fkey = nk && idx[nk];
      if (fkey) {
        const existing = coll[fkey] || {};
        Object.keys(r).forEach(f => {
          if (f==='createdAt' || f==='updatedAt') return;
          if (isEmpty(existing[f]) && !isEmpty(r[f])) fills[fkey+'/'+f] = r[f];   // fill blanks only
        });
      } else {
        adds[ref.push().key] = r;                // brand-new order — add it
      }
    });
    if (Object.keys(fills).length) await ref.update(fills);
    if (Object.keys(adds).length)  await ref.update(adds);
  };
  await mergeBatch('inbound',  data.inbound,  'loadNum');
  await mergeBatch('outbound', data.outbound, 'orderNum');
}

// ───────────────────────────── Auto-roll (Outbound) ─────────────────────────────
let _autoRollTimer = null;
function etParts() {
  try {
    const f = new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',hourCycle:'h23'});
    const p = {}; f.formatToParts(new Date()).forEach(x=>p[x.type]=x.value);
    return { date:`${p.year}-${p.month}-${p.day}`, hour:parseInt(p.hour,10)||0 };
  } catch(e) { const d=new Date(); return { date:todayStr(), hour:d.getHours() }; }
}
function nextBusinessDay(ymd) {
  const [Y,M,D] = ymd.split('-').map(Number);
  const d = new Date(Y, M-1, D);
  do { d.setDate(d.getDate()+1); } while (d.getDay()===0 || d.getDay()===6);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function eodPassed(ymd) {
  const et = etParts();
  if (ymd < et.date) return true;
  if (ymd === et.date) return et.hour >= 17;
  return false;
}
// Any outbound load not DEPARTED whose 5 PM ET cutoff has passed rolls to the next business day.
const NO_AUTO_ROLL_CUSTOMERS = ['SCI GAMES'];  // picked up/delivered overnight — manual roll only
function autoRollOutbound() {
  if (!state.user || state.user.group !== 'piper') return;
  if (state.settings && state.settings.autoRoll === false) return;   // disabled by admin
  const updates = {};
  Object.entries(state.outbound||{}).forEach(([id,r])=>{
    if (!r || r.status === 'DEPARTED' || r.status === 'CANCELLED') return;
    const cust = (r.customer||'').toUpperCase();
    if (NO_AUTO_ROLL_CUSTOMERS.some(c => cust.indexOf(c) > -1)) return;   // excluded customers (e.g. Sci Games)
    const d = (r.reqDate||'').slice(0,10);
    if (!d || !eodPassed(d)) return;
    if ((r.manualReqDate||'').slice(0,10) === d) return;   // user deliberately set this date — leave it
    let newD = d, guard = 0;
    while (eodPassed(newD) && guard++ < 500) newD = nextBusinessDay(newD);
    if (newD !== d) updates[id] = { reqDate:newD, origReqDate: r.origReqDate || d, apptTime: '' };
  });
  Object.keys(updates).forEach(id => db.ref(ROOT+'/outbound/'+id).update(updates[id]).catch(()=>{}));
}

// ───────────────────────────── Reports ─────────────────────────────
function periodInfo(ymd, gran) {
  const [Y,M,D] = ymd.split('-').map(Number);
  const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (gran==='day')   return { key:ymd, label:ymd };
  if (gran==='week') {
    const d = new Date(Y, M-1, D);
    const dow = (d.getDay()+6)%7;          // Mon=0
    d.setDate(d.getDate()-dow);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    return { key:k, label:'Week of '+k };
  }
  if (gran==='month')   return { key:`${Y}-${String(M).padStart(2,'0')}`, label:`${MON[M-1]} ${Y}` };
  if (gran==='quarter') { const q=Math.floor((M-1)/3)+1; return { key:`${Y}-Q${q}`, label:`Q${q} ${Y}` }; }
  return { key:`${Y}`, label:`${Y}` };
}
function buildReport(gran, from, to) {
  const inRange = d => (!from || d>=from) && (!to || d<=to);
  const vol = {};
  function volB(k,label,carrier){ vol[k]=vol[k]||{label,carriers:{}}; const c=(carrier||'(none)').toString().trim()||'(none)'; vol[k].carriers[c]=vol[k].carriers[c]||{recv:0,ship:0,roll:0}; return vol[k].carriers[c]; }
  Object.values(state.inbound||{}).forEach(r=>{ const d=(r.reqDate||'').slice(0,10); if(!d||!inRange(d))return; const pi=periodInfo(d,gran); volB(pi.key,pi.label,r.carrier).recv++; });
  Object.values(state.outbound||{}).forEach(r=>{ if(r.status!=='DEPARTED')return; const d=(r.reqDate||'').slice(0,10); if(!d||!inRange(d))return; const pi=periodInfo(d,gran); volB(pi.key,pi.label,r.carrier).ship++; });
  [].concat(Object.values(state.inbound||{}),Object.values(state.outbound||{})).forEach(r=>{ if(!isRolled(r))return; const d=(r.origReqDate||'').slice(0,10); if(!d||!inRange(d))return; const pi=periodInfo(d,gran); volB(pi.key,pi.label,r.carrier).roll++; });
  const ot = {};
  function otB(k,label){ ot[k]=ot[k]||{label,early:0,ontime:0,late:0,sumVar:0,sumAbs:0,n:0}; return ot[k]; }
  [].concat(Object.values(state.inbound||{}),Object.values(state.outbound||{})).forEach(r=>{
    const d=(r.reqDate||'').slice(0,10); if(!d||!inRange(d))return;
    if(!r.apptTime||!r.timeIn)return;
    const v=calcVariance(r.apptTime,r.timeIn); if(v===null)return;
    const pi=periodInfo(d,gran); const b=otB(pi.key,pi.label);
    b.n++; b.sumVar+=v; b.sumAbs+=Math.abs(v);
    if(v<0)b.early++; else if(v<15)b.ontime++; else b.late++;
  });
  return { vol, ot };
}

// ═══ SCORECARD ═════════════════════════════════════════════════════════
// Recreates the "6021 Piper Warehouse Daily Scorecard": one editable row per day,
// seven customer groups (5 load metrics each), receiving stats, and manual tons.
// ── Scorecard boards ────────────────────────────────────────────────────
// The Scorecard tab drives two boards: 6021 (every customer, rolled up to the parent account)
// and SMURFIT WRK (Smurfit Westrock only, broken out by member account). SC_GROUPS / SC_TONS
// are live bindings that scSetBoard() swaps, so the derive/render/report/extract code follows
// the active board unchanged. On the WRK board the tons list is NOT the group list — CBM has
// tons but no load column, and Pre Print / Hood / Pregis / Other have loads but no tons.
const SC_GROUPS_6021 = [
  {key:'WRK',  label:'SMURFIT WESTROCK'},
  {key:'CAT',  label:'CATALYST'},
  {key:'UPM',  label:'UPM'},
  {key:'TWIN', label:'TWIN RIVERS'},
  {key:'IPG',  label:'IPG'},
  {key:'IP',   label:'IP'},
  {key:'MAX',  label:'MAXXON'}
];
const SC_TONS_6021 = SC_GROUPS_6021.map(g=>({ key:g.key, label:g.key }));

const SC_GROUPS_WRK = [
  {key:'NOR',    label:'NORCROSS XDK'},
  {key:'COV',    label:'COVINGTON XDK'},
  {key:'PP',     label:'PRE PRINT'},        // Lithia Springs
  {key:'HOOD',   label:'HOOD'},
  {key:'PREGIS', label:'PREGIS'},
  {key:'SG',     label:'SCI GAMES'},
  {key:'HBH',    label:'HBH'},
  {key:'CON',    label:'CONWAY'},
  {key:'LAN',    label:'LANET'},
  {key:'OTHER',  label:'OTHER'}             // every other Smurfit booking
];
const SC_TONS_WRK = [
  {key:'NOR',label:'NOR'}, {key:'COV',label:'COV'}, {key:'CBM',label:'CBM'}, {key:'SG',label:'SG'},
  {key:'HBH',label:'HBH'}, {key:'CON',label:'CON'}, {key:'LAN',label:'LAN'}
];

let SC_GROUPS = SC_GROUPS_6021;
let SC_TONS   = SC_TONS_6021;
// SMURFIT WESTROCK rolls up these customers + anything containing "WRK".
const SC_WRK_MEMBERS = ['COVINGTON XDK','COV XDK','HBH','HOOD','LITHIA SPRINGS','NORCROSS XDK','NOR XDK','PREGIS','SCI GAMES'];
function scoreGroup(customer){
  const c = (customer||'').toUpperCase().trim();
  if (!c) return null;
  if (c.indexOf('WRK')>-1 || SC_WRK_MEMBERS.indexOf(c)>-1) return 'WRK';
  if (c.indexOf('CATALYST')>-1) return 'CAT';
  if (c.indexOf('MAXXON')>-1)   return 'MAX';
  if (c.indexOf('TWIN')>-1)     return 'TWIN';
  if (c.indexOf('IPG')>-1)      return 'IPG';   // check IPG before IP (IPG contains "IP")
  if (c.indexOf('UPM')>-1)      return 'UPM';
  if (c==='IP' || c.indexOf('INTERNATIONAL PAPER')>-1) return 'IP';
  return null;
}

// Smurfit Westrock customer base at 6021. The roll accounts (CBM, CONWAY, LANET and the two
// XDKs) are confirmed against PickFlow's FIFO/FEFO account lists and BU_MAP; the rest are
// dock-scheduler-only WRK bookings. Kept separate from scoreGroup() on purpose so the 6021
// board's existing roll-up is left exactly as it was.
const SC_WRK_ALL = ['CBM','CONWAY','COVINGTON XDK','COV XDK','HBH','HOOD','LANET','LANET - VALLEY',
                    'LITHIA SPRINGS','NORCROSS XDK','NOR XDK','PREGIS','SCI GAMES'];
function isWrkCustomer(c){
  const s = (c||'').toUpperCase().trim();
  if (!s) return false;
  return s.indexOf('WRK')>-1 || SC_WRK_ALL.indexOf(s)>-1 || SC_WRK_MEMBERS.indexOf(s)>-1;
}
// Customer → WRK board column. "WRK CONWAY" folds into CONWAY. Anything Smurfit that isn't one
// of the named accounts (CBM loads, ATL Sheet, Hebron, Reclamation, All South …) lands in OTHER.
function wrkGroup(customer){
  const c = (customer||'').toUpperCase().trim();
  if (!isWrkCustomer(c)) return null;
  if (c.indexOf('NORCROSS')>-1  || c==='NOR XDK') return 'NOR';
  if (c.indexOf('COVINGTON')>-1 || c==='COV XDK') return 'COV';
  if (c.indexOf('LITHIA')>-1)    return 'PP';
  if (c.indexOf('HOOD')>-1)      return 'HOOD';
  if (c.indexOf('PREGIS')>-1)    return 'PREGIS';
  if (c.indexOf('SCI GAMES')>-1) return 'SG';
  if (c.indexOf('HBH')>-1)       return 'HBH';
  if (c.indexOf('CONWAY')>-1)    return 'CON';
  if (c.indexOf('LANET')>-1)     return 'LAN';
  return 'OTHER';
}

const SC_BOARDS = {
  '6021': { label:'6021', short:'6021', tag:'',
            title:'6021 \u00b7 PIPER WAREHOUSE DAILY SCORECARD',
            store:'scorecard', path:'/scorecard',
            groups:SC_GROUPS_6021, tons:SC_TONS_6021, groupOf:scoreGroup, scope:null },
  'wrk':  { label:'SMURFIT WRK', short:'SMURFIT WESTROCK', tag:'-WRK',
            title:'SMURFIT WESTROCK \u00b7 PIPER WAREHOUSE DAILY SCORECARD',
            store:'scorecardWrk', path:'/scorecardWrk',
            groups:SC_GROUPS_WRK, tons:SC_TONS_WRK, groupOf:wrkGroup, scope:isWrkCustomer }
};
function scBoard(){ return SC_BOARDS[state.scBoard] || SC_BOARDS['6021']; }
// Each board keeps its own manual figures (tons, rail, trailers) under its own Firebase path.
function scRec(date){ return ((state[scBoard().store]||{})[date]) || {}; }
function scSetBoard(k){
  if (!SC_BOARDS[k] || state.scBoard===k) return;
  state.scBoard     = k;
  SC_GROUPS         = SC_BOARDS[k].groups;
  SC_TONS           = SC_BOARDS[k].tons;
  state.scCollapsed = {};          // collapse + highlight are per-board
  state.scHlRows    = {};
  renderScorecard();
}
function scNum(v){ const n=parseFloat(v); return isNaN(n)?0:n; }
// Heuristics for classifying loads pulled from the boards.
const SC_RAIL_RE = /(RAIL|CSX|NORFOLK|BNSF|UNION PACIFIC|BOXCAR|TTGX|GATX|\bNS\b|\bUP\b|\bCN\b)/i;
function scIsRail(r){ return SC_RAIL_RE.test(r.carrier||'') || !!(r.boxCar||r.railcar); }
function scIsFFTI(r){ return (r.carrier||'').toUpperCase().indexOf('FFTI')>-1; }
function scIsPWD(r){ const c=(r.carrier||'').toUpperCase(); return c.indexOf('PWD')>-1||c.indexOf('OWN FLEET')>-1||c.indexOf('PIPER')>-1; }
function scActive(r){ return (r.status||'').toUpperCase()!=='CANCELLED'; }
function scMonthStr(d){ return (d||new Date().toISOString().slice(0,10)).slice(0,7); }
function scDaysInMonth(month){
  const [y,m] = month.split('-').map(Number);
  const last = new Date(y, m, 0).getDate();
  const out = [];
  for (let d=1; d<=last; d++) out.push(month+'-'+String(d).padStart(2,'0'));
  return out;
}
function scWeekNum(dstr){
  const date = new Date(dstr+'T00:00:00');
  const start = new Date(date.getFullYear(),0,1);
  const days = Math.floor((date-start)/86400000);
  const jan1 = (start.getDay()+6)%7;   // Mon=0..Sun=6 (WEEKNUM type 2)
  return Math.floor((days+jan1)/7)+1;
}
function scIsWeekend(dstr){ const w=new Date(dstr+'T00:00:00').getDay(); return w===0||w===6; }

// Everything except Tons is derived live from the Inbound / Outbound / Yard boards.
function scDeriveDay(date){
  const ob = state.outbound||{}, ib = state.inbound||{};
  const B   = scBoard();
  const rec = scRec(date);
  const groups = {}; SC_GROUPS.forEach(g=>groups[g.key]={due:0,prior:0,dueToShip:0,shipped:0,balance:0});
  // Outbound → per-group ledger. Due Today keys off each load's ORIGINAL (created) date;
  // a departed load's reqDate is its ship date. Prior Pending = loads created earlier and
  // still unshipped at the start of this day → which is exactly the prior day's Balance.
  Object.values(ob).forEach(r=>{
    if (!scActive(r)) return;                              // ignore cancelled
    const g = B.groupOf(r.customer); if (!g || !groups[g]) return;
    const orig     = (r.origReqDate||r.reqDate||'').slice(0,10);   // date the load was created for
    const shipDate = (r.reqDate||'').slice(0,10);                  // for DEPARTED loads = day it shipped
    const departed = (r.status||'').toUpperCase()==='DEPARTED';
    if (orig === date) groups[g].due++;                                        // Due Today (created today)
    if (orig <  date && (!departed || shipDate >= date)) groups[g].prior++;    // rolled in, still pending at start of day
    if (departed && shipDate === date) groups[g].shipped++;                     // shipped today
  });
  // Forward-looking mask: current + arrears (≤ today) carry real numbers. The NEXT
  // subsequent (business) day shows only the pending carryover rolling in from today;
  // every day beyond it stays 0 until that day is actually reached. Due Today for any
  // future date is 0 until the day is applicable.
  const today = todayStr();
  if (date > today) {
    const nbd = nextBusinessDay(today);
    SC_GROUPS.forEach(gr=>{ const x=groups[gr.key]; x.due=0; x.shipped=0; if (date!==nbd) x.prior=0; });
  }
  let totalShipped = 0;
  SC_GROUPS.forEach(gr=>{ const x=groups[gr.key]; x.dueToShip = x.due + x.prior; x.balance = x.dueToShip - x.shipped; totalShipped += x.shipped; });
  // Manual free-type fields (entered on the grid, saved per date). FFTI/PWD trailers are a
  // beginning-of-day availability snapshot — entered by hand, not a count of the day's loads.
  // Tot Trk Recv is derived (not typed): every Inbound load marked COMPLETED for this date.
  // Rail is tracked separately (rail yard cards + Tot Rail Recv), so no double count here.
  let trkRecv = 0;
  Object.values(ib).forEach(r=>{
    if (!scActive(r)) return;
    if ((r.status||'').toUpperCase() !== 'COMPLETED') return;
    if ((r.reqDate||'').slice(0,10) !== date) return;
    if (B.scope && !B.scope(r.customer)) return;   // WRK board counts Smurfit receipts only
    trkRecv++;
  });
  const railRecv    = scNum(rec.railRecv);
  const pendRail    = scNum(rec.pendRail);
  const railTransit = scNum(rec.railTransit);
  const ffti        = scNum(rec.ffti);
  const pwd         = scNum(rec.pwd);
  const railToTruck = railRecv*4;
  return { date, trkRecv, railRecv, railToTruck, pendRail, railTransit, ffti, pwd,
    groups, totalShipped, totalLoads: trkRecv+railToTruck+totalShipped };
}

// Build every day of the month: load metrics derived from the boards, tons from manual entry.
function scComputeRow(date){
  const d = scDeriveDay(date);
  const tRec = scRec(date).t || {};
  const tons = {}; let tonsTotal = 0;
  SC_TONS.forEach(t=>{ const tv=scNum(tRec[t.key]); tons[t.key]=tv; tonsTotal+=tv; });
  d.tons = tons; d.tonsTotal = tonsTotal;
  return d;
}
function scComputeMonth(month){
  return scDaysInMonth(month).map(date => scComputeRow(date));
}

function saveScore(date, path, value){
  const v = (value===''||value===null||value===undefined) ? null : scNum(value);
  db.ref(ROOT+scBoard().path+'/'+date+'/'+path).set(v).catch(e=>console.warn('scorecard save',e));
}

// True while the user is typing in a scorecard cell — used to defer re-renders so the
// cursor isn't dropped mid data-entry (a save fires the Firebase listener → re-render).
function scGridEditing(){
  const a = document.activeElement, v = document.getElementById('view-sc');
  return !!(a && v && v.contains(a) && a.classList && a.classList.contains('sc-in'));
}
// Listener-driven re-renders are debounced and skipped while a cell is focused, so saving a
// value (which fires the Firebase listener) never rebuilds the grid out from under the cursor.
let _scRenderTimer = null;
function scDeferRender(){
  clearTimeout(_scRenderTimer);
  _scRenderTimer = setTimeout(()=>{ if (state.tab==='sc' && !scGridEditing()) renderScorecard(); }, 250);
}
// Tab / Shift+Tab move to the next / previous editable cell: right across the row, then
// wrap to the next row's first editable cell.
function scTabNav(e, el){
  if (e.key !== 'Tab') return;
  e.preventDefault();
  const list = Array.from(document.querySelectorAll('#view-sc .sc-in'));
  const i = list.indexOf(el);
  if (i < 0) return;
  const target = list[i + (e.shiftKey ? -1 : 1)];
  if (target){ target.focus(); if (target.select) target.select(); }
}

// Row highlighting — click any day row to pin a highlighter (session-scoped, multiple rows OK).
function scToggleRow(date){
  state.scHlRows = state.scHlRows || {};
  if (state.scHlRows[date]) delete state.scHlRows[date]; else state.scHlRows[date] = true;
  renderScorecard();
}
function scRowClick(e, date){
  // don't hijack a click that's landing in a Tons / receiving input
  if (e && e.target && e.target.closest && e.target.closest('input')) return;
  scToggleRow(date);
}
function scClearHl(){ state.scHlRows = {}; renderScorecard(); }

// Per-customer column collapse (Prior Pend / Due to Ship). Balance always stays visible. Session-scoped.
function scGroupHidden(k){ return !!((state.scCollapsed||{})[k]); }
function toggleScGroup(k){
  state.scCollapsed = state.scCollapsed || {};
  state.scCollapsed[k] = !state.scCollapsed[k];
  renderScorecard();
}
function scToggleAllGroups(){
  const anyOpen = SC_GROUPS.some(g=>!scGroupHidden(g.key));
  const next = {};
  if (anyOpen) SC_GROUPS.forEach(g=>{ next[g.key] = true; });
  state.scCollapsed = next;
  renderScorecard();
}

function renderScorecard(){
  const view = document.getElementById('view-sc');
  if (!view) return;
  if (scGridEditing()) return;   // don't rebuild the grid out from under an active cursor
  keepScroll(view);
  if (!state.scMonth) state.scMonth = scMonthStr(todayStr());
  const month = state.scMonth;
  const rows = scComputeMonth(month);
  const today = todayStr();
  const cell = v => Math.round((v||0)*100)/100;    // show 0 for no activity
  // Manual free-type cell (tons + the four receiving fields). Focus-selects for fast tabbing.
  const minp = (date,path,val)=>`<input class="sc-in" type="number" step="any" value="${val||0}" onfocus="this.select()" onkeydown="scTabNav(event,this)" onchange="saveScore('${date}','${path}',this.value)">`;

  // ── two-row header (group bands + sub columns) ──
  const grpBand = SC_GROUPS.map(g=>{
    const hid = scGroupHidden(g.key);
    return `<th class="sc-gcol sc-gsep" colspan="${hid?3:5}"><span class="sc-gtog" onclick="toggleScGroup('${g.key}')" title="${hid?'Show':'Hide'} Prior Pend / Due to Ship">${g.label} ${hid?'\u25B8':'\u25BE'}</span></th>`;
  }).join('');
  const tonsBand = `<th class="sc-tons sc-gsep" colspan="${SC_TONS.length+1}">Tons (AM of day of)</th>`;
  const head1 = `<tr class="sc-grp">
    <th class="sc-date" rowspan="2">Date</th><th rowspan="2">Wk</th>
    <th colspan="6">Receiving</th>
    ${grpBand}
    <th colspan="2" class="sc-gsep">Totals</th>
    ${tonsBand}
  </tr>`;
  const recSub = ['Tot Trk Recv','Tot Rail Recv','Pend Rail Yard','Rail In Transit','FFTI Trlrs','PWD Trlrs'].map(h=>`<th>${h}</th>`).join('');
  const grpSub = SC_GROUPS.map(g=>{
    const hs = scGroupHidden(g.key) ? ['Due Today','Shipped','Balance'] : ['Due Today','Prior Pend','Due to Ship','Shipped','Balance'];
